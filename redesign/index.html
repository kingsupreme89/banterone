<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>BanterONE</title>
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --sheet: #0d0d0d;
      --disabled: #0f0f0f;
      --lime: #C6FF3A;
      --blue: #5b8def;
      --red: #e5484d;
      --text: #f5f5f0;
      --body: #d5d5cf;
      --soft: #c9c9c0;
      --muted: #8a8a82;
      --eyebrow: #7a7a72;
      --off: #4a4a46;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .phone {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 520px) {
      body { min-height: 100vh; display: grid; place-items: center; }
      .phone { width: min(100vw, 390px); height: min(100vh, 844px); border-radius: 46px; border: 10px solid #060606; box-shadow: 0 40px 80px rgba(0,0,0,0.22); }
      .phone:before {
        content: "";
        position: absolute;
        top: 11px;
        left: 50%;
        width: 126px;
        height: 37px;
        transform: translateX(-50%);
        border-radius: 24px;
        background: #000;
        z-index: 30;
      }
    }

    @keyframes glowPulse { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

    .glow {
      position: absolute;
      inset: 0 0 auto;
      height: 280px;
      pointer-events: none;
      background: radial-gradient(ellipse 480px 260px at 50% -70px, rgba(198,255,58,.13), transparent);
      animation: glowPulse 3.2s ease-in-out infinite;
      z-index: 0;
    }

    #screen-wrap {
      position: relative;
      z-index: 1;
      height: 100%;
      overflow: auto;
      scrollbar-width: none;
    }
    #screen-wrap::-webkit-scrollbar { display: none; }
    .screen {
      padding: 56px 18px 96px;
    }

    .screen.top-space { padding-top: 56px; }
    .login { padding: 64px 22px 40px; display: flex; flex-direction: column; }

    .wordmark { font-family: "Instrument Serif", serif; font-size: 32px; line-height: 1; }
    .wordmark strong { color: var(--lime); font-style: italic; font-weight: 400; }
    .wordmark span { color: var(--text); }
    .muted-kicker { margin-top: 6px; font-size: 10px; letter-spacing: .12em; color: var(--eyebrow); text-transform: uppercase; }

    .top-cluster {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-button, .points-badge {
      height: 38px;
      border-radius: 12px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-button { width: 38px; }
    .points-badge {
      gap: 6px;
      padding: 0 10px;
      border-color: rgba(198,255,58,.2);
      text-align: left;
    }
    .points-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--lime);
      color: var(--bg);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 800;
    }
    .points-value { display: block; font-size: 12px; font-weight: 800; line-height: 1; }
    .points-label { display: block; font-size: 7px; letter-spacing: .08em; color: var(--eyebrow); line-height: 1.2; margin-top: 2px; }
    .badge {
      position: absolute;
      top: -3px;
      right: -3px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      padding: 0 3px;
      display: grid;
      place-items: center;
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.5);
    }

    .store-card {
      border-radius: 20px;
      padding: 18px;
      margin: 14px 0;
      box-shadow: 0 10px 28px rgba(0,0,0,.55);
    }

    .eyebrow { font-size: 10px; letter-spacing: .12em; color: var(--lime); font-weight: 700; text-transform: uppercase; }
    .serif { font-family: "Instrument Serif", serif; font-weight: 400; }
    .store-title { margin-top: 2px; font-size: 24px; color: var(--text); }
    .caption { margin-top: 2px; color: var(--muted); font-size: 12px; }

    .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .kpi { padding: 14px; min-height: 103px; }
    .kpi-label { font-size: 9px; letter-spacing: .1em; color: var(--eyebrow); text-transform: uppercase; }
    .kpi-value { margin-top: 4px; font-family: "Instrument Serif", serif; font-size: 26px; color: var(--text); }
    .kpi-value.lime { color: var(--lime); }
    .kpi-note { font-size: 10px; color: var(--eyebrow); }

    .section-row { display: flex; align-items: center; justify-content: space-between; margin: 0 0 8px; }
    .section-title { font-size: 14px; font-weight: 700; }
    .link-action { border: 0; background: transparent; color: var(--lime); font-size: 11px; font-weight: 700; padding: 0; }
    .neon-spacer {
      height: 1px;
      margin: 16px 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(198,255,58,.28), rgba(198,255,58,.9), rgba(198,255,58,.28), transparent);
      box-shadow: 0 0 12px rgba(198,255,58,.22);
      position: relative;
    }
    .neon-spacer:after {
      content: "";
      position: absolute;
      left: 50%;
      top: -2px;
      width: 34px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(198,255,58,.2);
      filter: blur(5px);
    }
    .neon-spacer.compact { margin: 12px 0; opacity: .82; }
    .neon-spacer.left {
      width: 118px;
      margin: 12px 0 14px;
      background: linear-gradient(90deg, rgba(198,255,58,.95), rgba(198,255,58,.18), transparent);
    }
    .neon-spacer.left:after { left: 18px; width: 42px; transform: none; }
    .plus {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--lime);
      color: var(--bg);
      display: inline-grid;
      place-items: center;
      margin-left: 5px;
      font-weight: 800;
      font-size: 12px;
    }

    .post { padding: 14px; margin-bottom: 10px; }
    .post-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--lime);
      color: var(--bg);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .post-name { font-size: 12px; font-weight: 700; }
    .post-time { font-size: 10px; color: var(--eyebrow); }
    .post-body { color: var(--body); font-size: 13px; line-height: 1.4; margin-bottom: 10px; }
    .reactions { display: flex; gap: 6px; flex-wrap: wrap; }
    .reaction {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--soft);
      font-size: 11px;
    }
    .reaction.active {
      background: rgba(198,255,58,.12);
      border-color: rgba(198,255,58,.4);
      color: var(--lime);
    }
    .flair {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .06em;
    }
    .flair.news { color: var(--blue); background: rgba(91,141,239,.14); border: 1px solid rgba(91,141,239,.3); }
    .flair.shoutout { color: var(--lime); background: rgba(198,255,58,.12); border: 1px solid rgba(198,255,58,.3); }
    .flair.update { color: #f5a524; background: rgba(245,165,36,.14); border: 1px solid rgba(245,165,36,.3); }
    .pinned { margin-left: auto; color: var(--lime); font-size: 9px; font-weight: 800; letter-spacing: .08em; }

    .leader-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      box-shadow: none;
      border-radius: 14px;
    }
    .rank { width: 26px; height: 26px; border-radius: 8px; background: var(--bg); color: var(--eyebrow); display: grid; place-items: center; font-size: 11px; font-weight: 700; }
    .store-chip { background: var(--bg); border: 1px solid rgba(198,255,58,.25); border-radius: 8px; color: var(--lime); padding: 5px 7px; font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 700; }

    .charges { display: flex; gap: 8px; margin-bottom: 14px; }
    .charge { flex: 1; text-align: center; padding: 8px 4px; border-radius: 12px; box-shadow: none; }
    .charge span { display: block; color: var(--eyebrow); font-size: 9px; }
    .charge strong { display: block; color: var(--lime); font-size: 15px; margin-top: 2px; }
    .helper-link { border: 0; background: transparent; color: var(--eyebrow); width: 100%; text-align: center; font-size: 11px; margin-bottom: 14px; }
    .helper-link span { color: var(--lime); }

    .buddy-card {
      overflow: hidden;
      border-radius: 22px;
      border-color: rgba(198,255,58,.16);
      box-shadow: 0 0 22px rgba(198,255,58,.08), 0 10px 28px rgba(0,0,0,.5);
      margin-bottom: 14px;
    }
    .buddy-art {
      height: 200px;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: var(--lime);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: .08em;
    }
    .buddy-art img { height: 180px; width: auto; object-fit: contain; }
    .level-pill { position: absolute; top: 12px; left: 12px; border: 1px solid var(--lime); border-radius: 999px; padding: 4px 10px; background: var(--bg); color: var(--lime); font-size: 10px; font-weight: 800; font-family: Inter, sans-serif; }
    .buddy-inner { padding: 16px; }
    .stat { margin-bottom: 8px; }
    .stat-row { display: flex; justify-content: space-between; color: var(--soft); font-size: 11px; margin-bottom: 3px; }
    .track { height: 5px; border-radius: 3px; background: #232320; overflow: hidden; }
    .fill { height: 100%; border-radius: 3px; background: var(--lime); }
    .fill.blue { background: var(--blue); }
    .buddy-actions { display: flex; gap: 8px; margin-top: 14px; }
    .buddy-actions button {
      flex: 1;
      border-radius: 12px;
      padding: 9px;
      color: var(--text);
      background: transparent;
      border: 1px solid rgba(255,255,255,.16);
      font-size: 12px;
      font-weight: 600;
    }
    .buddy-actions button:disabled { color: var(--off); background: var(--disabled); border-color: rgba(255,255,255,.06); cursor: default; }

    .evolution { padding: 14px; margin-bottom: 18px; }
    .pill-nav {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
    }
    .pill-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2px;
      background: #131313e8;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 28px;
      padding: 8px 8px;
      box-shadow: 0 16px 34px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .nav-slot {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .nav-btn.active { background: var(--lime); color: var(--bg); }
    .buddy-slot {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .buddy-nav {
      width: 56px;
      height: 56px;
      margin-top: -8px;
      border-radius: 50%;
      border: 1px solid rgba(198,255,58,.3);
      background: #1c1c1a;
      color: var(--lime);
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 24px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px #131313, 0 6px 16px rgba(0,0,0,.5);
    }
    .buddy-nav.active { background: var(--lime); color: var(--bg); border: 0; box-shadow: 0 0 0 4px #131313, 0 6px 18px rgba(198,255,58,.5); }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: rgba(0,0,0,.58);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .full-overlay {
      position: absolute;
      inset: 0;
      z-index: 38;
      background: var(--sheet);
      padding: 56px 18px 24px;
      overflow: auto;
    }
    .sheet {
      max-height: 78%;
      overflow: auto;
      background: var(--sheet);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px 24px 0 0;
      padding: 18px;
      box-shadow: 0 -20px 50px rgba(0,0,0,.55);
    }
    .modal-card {
      width: calc(100% - 36px);
      margin: auto 18px;
      align-self: center;
      background: var(--sheet);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.7);
    }
    .overlay-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .close { width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: var(--text); font-size: 18px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .primary {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px;
      background: var(--lime);
      color: var(--bg);
      font-weight: 800;
      font-size: 13px;
    }
    .primary:disabled { background: #232320; color: #5a5a56; cursor: default; }
    .secondary {
      width: 100%;
      border-radius: 12px;
      padding: 12px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      font-size: 13px;
      text-align: left;
    }
    .field, .lesson, .answer, .notif {
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      padding: 12px;
      margin-bottom: 8px;
    }
    .lesson { text-align: left; width: 100%; color: var(--text); }
    .answer { width: 100%; color: var(--text); text-align: left; }
    .answer.selected { background: #1c2410; border-color: var(--lime); color: var(--lime); }
    .field label { display: block; color: var(--eyebrow); font-size: 9px; font-weight: 800; letter-spacing: .1em; margin-bottom: 6px; }
    .field input {
      width: 100%;
      color: var(--text);
      background: var(--bg);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 13px;
    }
    .row-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: transparent;
      color: var(--text);
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      padding: 0;
    }
    .row-item:last-child { border-bottom: 0; }
    .row-icon { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: var(--bg); }
    .chev { margin-left: auto; color: var(--eyebrow); }
    .toggle {
      width: 44px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: #30302c;
      padding: 2px;
      margin-left: auto;
    }
    .toggle span { display: block; width: 20px; height: 20px; border-radius: 50%; background: #8b8b83; transition: transform .16s; }
    .toggle.on { background: var(--lime); }
    .toggle.on span { transform: translateX(20px); background: var(--bg); }
    .settings-group { padding: 4px 14px 8px; margin-bottom: 14px; }
    .settings-group-title { margin: 18px 0 8px; color: var(--eyebrow); font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }

    .login-logo { text-align: center; margin-bottom: 34px; }
    .login-logo .wordmark { font-size: 44px; }
    .login-card {
      border-color: rgba(198,255,58,.16);
      border-radius: 22px;
      box-shadow: 0 0 22px rgba(198,255,58,.08), 0 10px 28px rgba(0,0,0,.55);
      padding: 22px;
      margin-bottom: 14px;
    }
    .login-input {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .login-select {
      width: 100%;
      appearance: none;
      background: var(--bg);
      color: var(--text);
      border: 1px solid rgba(198,255,58,.22);
      border-radius: 12px;
      padding: 13px 38px 13px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      outline: none;
    }
    .select-wrap {
      position: relative;
    }
    .select-wrap:after {
      content: "⌄";
      position: absolute;
      right: 14px;
      top: 11px;
      color: var(--lime);
      font-size: 16px;
      pointer-events: none;
    }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 0 0 18px; color: var(--soft); font-size: 12px; cursor: pointer; }
    .check { width: 18px; height: 18px; border-radius: 5px; border: 1px solid rgba(255,255,255,.2); display: grid; place-items: center; color: var(--bg); font-size: 11px; font-weight: 800; }
    .check.on { background: var(--lime); border-color: var(--lime); }
    .toast {
      position: absolute;
      z-index: 60;
      left: 50%;
      bottom: 86px;
      transform: translateX(-50%);
      background: var(--lime);
      color: var(--bg);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 800;
      animation: toastIn .18s ease both;
      white-space: nowrap;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
    .cal-head { font-size: 9px; font-weight: 700; letter-spacing: .1em; color: var(--muted); text-align: center; padding: 6px 0; }
    .cal-cell {
      min-height: 52px;
      background: rgba(20,20,20,.5);
      border-radius: 4px;
      padding: 3px;
      position: relative;
    }
    .cal-cell.today { background: rgba(198,255,58,.08); }
    .cal-cell.empty { background: transparent; }
    .cal-day { font-size: 10px; font-weight: 700; color: var(--soft); margin-bottom: 2px; }
    .cal-cell.today .cal-day { color: var(--lime); }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex: 0 0 5px; }
    .cal-month-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-month-bar button {
      border: 0; background: transparent; color: var(--lime); font-size: 16px; font-weight: 700;
      padding: 4px 10px;
    }
    .cal-month-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .cal-day-detail { margin-top: 12px; }
    .cal-event-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(20,20,20,.6);
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .cal-event-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; }
    .cal-event-text { font-size: 12px; color: var(--text); flex: 1; }
    .cal-event-cat { font-size: 9px; color: var(--muted); letter-spacing: .06em; }
    .cal-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.06); }
    .cal-legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--muted); }

      const first = parts[0].replace(/[^a-zA-Z]/g, "");

    function storeScreen() {
      const user = activeUser();
      const store = activeStore();
      const sub = submissionForStore(store.id);
      const planPct = Math.round((sub.bold / store.dailyPlan) * 100);
      const weeklyPlan = store.dailyPlan * 7;
      const mtdSales = sub.bold * 2;
      const mtdPlan = store.dailyPlan * 30;
      const mtdPct = Math.round((mtdSales / mtdPlan) * 100);
      const convRate = sub.trans ? Math.round((sub.trans / (sub.trans + 8)) * 100) : 0;
      const esaPct = sub.trans ? Math.round((sub.esa / sub.trans) * 100) : 0;
      const epPct = sub.trans ? Math.round((sub.ep / sub.trans) * 100) : 0;

      const team = users.filter(u => u.storeId === store.id);
      const teamMetrics = team.map(u => {
        const m = individualMetrics.find(im => im.email === u.email) || { sales: 0, piercingSales: 0, esaSales: 0, piercings: 0, esaCount: 0 };
        return { ...u, ...m };
      }).sort((a, b) => b.sales - a.sales);

      const storeBoard = buildStoreBoard("today");
      const rankIndex = store.id === "DISTRICT" ? 0 : storeBoard.findIndex(row => row.id === store.id);
      const rankText = rankIndex >= 0 ? `#${rankIndex + 1}` : "--";

      function metricRow(label, value, goal, unit = "") {
        const pct = goal ? Math.min(100, Math.round((value / goal) * 100)) : 0;
        const clr = pct >= 100 ? "var(--lime)" : "var(--text)";
        const display = typeof value === "number" ? value.toLocaleString() : value;
        const goalStr = goal ? ` / ${unit}${goal.toLocaleString()} · ${pct}%` : "";

      return `

          <div class="section-row"><div class="section-title">Daily Metrics</div></div>

            ${metricRow("Transactions", sub.trans, Math.round(store.dailyPlan / 160), "")}
            ${metricRow("Average Ticket", sub.avt, 155, "$")}
            ${metricRow("Ear Piercings", sub.ep, 4, "")}
            ${metricRow("ESA Warranties", sub.esa, 3, "")}
            ${metricRow("Payment Options", sub.po, 2, "")}
            ${metricRow("St. Jude", sub.stj, 30, "$")}
          </div>

          <div class="neon-spacer"></div>
          <div class="section-row"><div class="section-title">Weekly Targets</div></div>
          <div class="card" style="padding:14px">
            ${metricRow("Weekly Plan", sub.bold * 5, weeklyPlan, "$")}
            ${metricRow("Ear Piercings", sub.ep * 5, 28, "")}
            ${metricRow("ESA Warranties", sub.esa * 5, 22, "")}
            ${metricRow("Payment Options", sub.po * 5, 12, "")}
            ${metricRow("St. Jude", sub.stj * 5, 150, "$")}
          </div>

          <div class="neon-spacer left"></div>
          <div class="section-row"><div class="section-title">MTD Progress</div><div class="post-time">${new Date().toLocaleDateString("en-US", { month: "short" })} · Day ${new Date().getDate()}</div></div>
          <div class="card" style="padding:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:12px;color:var(--soft)">Month-to-Date Sales</span>
              <span style="font-size:14px;font-weight:700;color:var(--lime)">${money(mtdSales)}</span>
            </div>
            <div class="track" style="height:8px;margin-bottom:6px"><div class="fill" style="width:${Math.min(100, mtdPct)}%"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
              <span>${mtdPct}% of monthly plan</span>
              <span>Goal: ${money(mtdPlan)}</span>
            </div>
            <div style="margin-top:14px;display:flex;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:12px;color:var(--soft)">MTD Piercings</span>
              <span style="font-size:14px;font-weight:700">${sub.ep * 2}</span>
            </div>
            <div class="track" style="height:8px;margin-bottom:6px"><div class="fill blue" style="width:${Math.min(100, Math.round(sub.ep*2/56*100))}%"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
              <span>${Math.round(sub.ep*2/56*100)}% of monthly goal</span>
              <span>Goal: 56</span>
            </div>
          </div>

          ${teamMetrics.length > 0 ? `
          <div class="neon-spacer"></div>
          <div class="section-row"><div class="section-title">Team Roster</div><div class="post-time">${teamMetrics.length} members</div></div>
          ${teamMetrics.map(tm => `
            <div class="card" style="padding:12px;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <div class="avatar" style="width:34px;height:34px;font-size:11px">${(tm.name || "?").split(" ").map(p => p[0]).join("").slice(0,2)}</div>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:700">${tm.name}</div>
                  <div style="font-size:10px;color:var(--muted)">${tm.role}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:14px;font-weight:700;color:var(--lime)">${money(tm.sales)}</div>
                  <div style="font-size:10px;color:var(--muted)">sales</div>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
                <div style="text-align:center;padding:6px;background:var(--bg);border-radius:8px">
                  <div style="font-size:13px;font-weight:700">${tm.piercings}</div>
                  <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Piercings</div>
                </div>
                <div style="text-align:center;padding:6px;background:var(--bg);border-radius:8px">
                  <div style="font-size:13px;font-weight:700">${tm.esaCount}</div>
                  <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">ESA</div>
                </div>
                <div style="text-align:center;padding:6px;background:var(--bg);border-radius:8px">
                  <div style="font-size:13px;font-weight:700">${money(tm.esaSales)}</div>
                  <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Warranty $</div>
                </div>
              </div>
            </div>
          `).join("")}` : ""}

          <div class="neon-spacer left"></div>
          <div class="section-row"><div class="section-title">Store Goals</div></div>
          <div class="card" style="padding:14px">
            <div class="eyebrow" style="margin-bottom:10px">FY27 Annual Targets</div>
            ${metricRow("Annual Sales", mtdSales * 6, store.dailyPlan * 365, "$")}
            ${metricRow("Piercings YTD", sub.ep * 60, store.dailyPlan > 4000 ? 800 : 600, "")}
            ${metricRow("ESA Attach Rate", esaPct, 30, "")}
            ${metricRow("Conversion Rate", convRate, 38, "")}
          </div>

          <div class="neon-spacer left"></div>
          <div class="section-row"><div class="section-title">Manager Tools</div></div>
          <button class="card" data-action="open-reports" style="width:100%;text-align:left;padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
            <span style="font-size:22px">📋</span>
            <div>
              <div style="font-size:14px;font-weight:700">Disciplinary Reports</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">${user.storeId === "DISTRICT" ? "All stores · " : `Store ${user.storeId} · `}${state.disciplinaryReports.filter(r => user.storeId === "DISTRICT" || r.storeId === user.storeId).length} on file</div>
            </div>
            <span style="margin-left:auto;color:var(--muted)">›</span>
          </button>
          <div style="height:12px"></div>
        </section>`;
    }

    function buddyScreen() {
      const b = state.buddy;
      return `
        <section class="screen">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
            <div><div class="serif" style="font-size:22px">My Banter Buddy</div><div style="font-size:11px;color:var(--muted)">Level ${b.level} · ${b.xp}/${b.xpNext} XP</div></div>
            ${topCluster()}
          </div>
          <div class="charges">
            ${charge("Feed", state.charges.feed)}
            ${charge("Train", state.charges.train)}
            ${charge("Cheer", state.charges.cheer)}
          </div>
          <button class="helper-link" data-action="open-info">How do I earn charges? <span>Learn more →</span></button>
          <div class="neon-spacer compact"></div>
          <div class="card buddy-card">
            <div class="buddy-art"><img src="buddy-gem.png" alt="Banter Buddy"><span class="level-pill">LV.${b.level}</span></div>
            <div class="buddy-inner">
              <div class="kpi-label" style="margin-bottom:8px">Care</div>
              ${stat("Care", b.care)}
              ${stat("Spark", b.spark, true)}
              ${stat("Bond", b.bond)}
              <div class="buddy-actions">
                <button data-action="feed-buddy" ${state.charges.feed <= 0 ? "disabled" : ""}>Feed${state.charges.feed <= 0 ? "" : ` (${state.charges.feed})`}</button>
                <button data-action="start-train" ${state.charges.train <= 0 ? "disabled" : ""}>Train${state.charges.train <= 0 ? "" : ` (${state.charges.train})`}</button>
                <button data-action="cheer-buddy" ${state.charges.cheer <= 0 ? "disabled" : ""}>Cheer${state.charges.cheer <= 0 ? "" : ` (${state.charges.cheer})`}</button>
              </div>
              ${state.charges.feed <= 0 || state.charges.train <= 0 || state.charges.cheer <= 0 ? `<div style="font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5">${state.charges.feed <= 0 ? "📦 Sell $500+ to earn Feed charges<br>" : ""}${state.charges.train <= 0 ? "💎 Complete a piercing to earn Train charges<br>" : ""}${state.charges.cheer <= 0 ? "🛡️ Attach an ESA warranty to earn Cheer charges" : ""}</div>` : ""}
            </div>
          </div>
          <button class="card evolution" data-action="open-info" style="width:100%;text-align:left;color:var(--text)">
            <div class="section-row" style="margin-bottom:8px"><span class="kpi-label">Evolution</span><span class="link-action">How it works →</span></div>
            <div class="serif" style="font-size:24px;color:var(--lime);font-style:italic">Styled</div>
            <div class="track" style="margin:8px 0"><div class="fill" style="width:${pct((b.xp / b.xpNext) * 100)}"></div></div>
            <div class="post-time">Needs Level 3 and 250 XP</div>
          </button>
        </section>`;
    }

    function charge(label, count) {
      return `<div class="card charge"><span>${label.toUpperCase()}</span><strong>${count}</strong></div>`;
    }

    function stat(label, value, blue = false) {
      return `<div class="stat"><div class="stat-row"><span>${label}</span><span>${value}%</span></div><div class="track"><div class="fill ${blue ? "blue" : ""}" style="width:${pct(value)}"></div></div></div>`;
    }

    function playbookScreen() {
      return `
        <section class="screen top-space">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
            <h1 class="serif" style="font-size:26px;margin:0">Playbook</h1>
            ${topCluster()}
          </div>
          <div class="card post"><div class="eyebrow">Mall Security</div><div class="serif store-title">Call first for overnight issues</div><div class="caption">Use the manager line for after-hours lockbox, safety, or emergency escort requests.</div></div>
          <div class="card post"><div class="eyebrow">FY27 Commission Ladder</div><div class="serif store-title">Rates, stretch tiers, and attach goals</div><div class="caption">Keep warranty and piercing attach conversations tied to customer care.</div></div>
          <div class="neon-spacer left"></div>
          <div class="section-row" style="margin-top:18px"><div class="section-title">Training Lessons</div></div>
          ${lessons.map(l => `<button class="lesson" data-action="open-lesson" data-id="${l.id}"><strong>${l.title}</strong><div class="post-time" style="margin-top:4px">${l.meta}</div></button>`).join("")}
          <div class="neon-spacer left"></div>
          <div class="section-row" style="margin-top:18px"><div class="section-title">Source Documents</div></div>
          ${playbookDocs.map(doc => `<a class="lesson" href="docs/${encodeURIComponent(doc)}" target="_blank" rel="noreferrer" style="display:block;text-decoration:none"><strong>${cleanDocName(doc)}</strong><div class="post-time" style="margin-top:4px">PDF · Source document</div></a>`).join("")}
        </section>`;
    }

    function arenaScreen() {
      const storeBoard = buildStoreBoard(state.arenaScope);
      const individualBoard = buildIndividualBoard(state.individualMetric);
      return `
        <section class="screen top-space">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
            <h1 class="serif" style="font-size:28px;margin:0">District Arena</h1>
            ${topCluster()}
          </div>
          <div class="caption" style="margin-bottom:12px">11-store CO + NM roster · seeded from the existing BanterONE data.</div>
          <div class="neon-spacer left"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px">
            ${arenaTab("today", "Today")}
            ${arenaTab("monthly", "Monthly")}
            ${arenaTab("ytd", "YTD")}
          </div>
          <div class="section-row"><div class="section-title">Store Leaderboard</div><div class="post-time">${scopeLabel(state.arenaScope)}</div></div>
          ${storeBoard.map(storeArenaRow).join("")}
          <div class="neon-spacer"></div>
          <div class="section-row" style="margin-top:18px"><div class="section-title">Individual Leaderboard</div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px">
            ${metricTab("sales", "Sales")}
            ${metricTab("piercings", "Piercings")}
            ${metricTab("esa", "ESA")}
          </div>
          ${individualBoard.map(individualArenaRow).join("")}
        </section>`;
    }

    function money(value) {
      return `$${Math.round(Number(value) || 0).toLocaleString()}`;
    }

    function cleanDocName(name) {
      return name.replace(/\.pdf$/i, "").replace(/\s+\(\d+\)$/g, "");
    }

    function arenaTab(scope, label) {
      const active = state.arenaScope === scope;
      return `<button class="nav-btn ${active ? "active" : ""}" data-action="arena-scope" data-scope="${scope}" style="height:34px;border:1px solid rgba(255,255,255,.08)">${label}</button>`;
    }

    function metricTab(metric, label) {
      const active = state.individualMetric === metric;
      return `<button class="nav-btn ${active ? "active" : ""}" data-action="individual-metric" data-metric="${metric}" style="height:34px;border:1px solid rgba(255,255,255,.08)">${label}</button>`;
    }

    function scopeLabel(scope) {
      if (scope === "today") return "Today $";
      if (scope === "monthly") return "MTD $";
      return "YTD $";
    }

    function scopeMultiplier(scope) {
      if (scope === "today") return 1;
      if (scope === "monthly") return 2;
      return 13;
    }

    function buildStoreBoard(scope) {
      const multiplier = scopeMultiplier(scope);
      return stores.map(store => {
        const sub = dailySubmissions.find(row => row.storeId === store.id) || {};
        const bold = (sub.bold || 0) * multiplier;
        const plan = store.dailyPlan * multiplier;
        return {
          ...store,
          bold,
          stj: (sub.stj || 0) * multiplier,
          ep: (sub.ep || 0) * multiplier,
          esa: (sub.esa || 0) * multiplier,
          pct: plan ? Math.round((bold / plan) * 100) : 0
        };
      }).sort((a, b) => b.bold - a.bold);
    }

    function storeArenaRow(row, index) {
      const user = activeUser();
      const isMine = user.storeId === "DISTRICT" ? false : row.id === user.storeId;
      return `
        <div class="card leader-row">
          <div class="rank">${index + 1}</div>
          <div class="store-chip">#${row.id}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${row.name}${isMine ? ' <span style="color:var(--lime)">· YOU</span>' : ""}</div>
            <div class="post-time">${row.mall}</div>
            <div class="post-time">${row.manager} · EP ${row.ep} · ESA ${row.esa} · St. Jude ${money(row.stj)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:13px;font-weight:800">${money(row.bold)}</div>
            <div class="post-time" style="${row.pct >= 100 ? "color:var(--lime);font-weight:800" : ""}">${row.pct}%</div>
          </div>
        </div>`;
    }

    function buildIndividualBoard(metric) {
      const valueKey = metric === "piercings" ? "piercings" : metric === "esa" ? "esaSales" : "sales";
      return individualMetrics.map(row => {
        const user = users.find(person => person.email === row.email) || {};
        return { ...row, ...user, value: row[valueKey] || 0 };
      }).sort((a, b) => b.value - a.value);
    }

    function individualArenaRow(row, index) {
      const moneyMetric = state.individualMetric !== "piercings";
      const value = moneyMetric ? money(row.value) : `${row.value}`;
      const user = activeUser();
      return `
        <div class="card leader-row">
          <div class="rank">${index + 1}</div>
          <div class="avatar" style="width:32px;height:32px">${(row.name || "?").split(" ").map(part => part[0]).join("").slice(0,2)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${row.name || row.email}${row.email === user.email ? ' <span style="color:var(--lime)">· YOU</span>' : ""}</div>
            <div class="post-time">Store ${row.storeId || "—"} · ${row.role || "—"}</div>
          </div>
          <div style="font-size:13px;font-weight:800;color:var(--lime);text-align:right">${value}</div>
        </div>`;
    }

    function nav() {
      if (state.tab === "login") return "";
      return `
        <nav class="pill-nav" aria-label="Primary">
          <div class="pill-nav-inner">
            <div class="nav-slot">${navButton("home", "Home")}</div>
            <div class="nav-slot">${navButton("store", "Store")}</div>
            <div class="buddy-slot">
              <button class="buddy-nav ${state.tab === "buddy" ? "active" : ""}" data-action="tab" data-tab="buddy" aria-label="Banter Buddy">B</button>
            </div>
            <div class="nav-slot">${navButton("playbook", "Playbook")}</div>
            <div class="nav-slot">${navButton("arena", "Arena")}</div>
          </div>
        </nav>`;
    }

    function navButton(tab, label) {
      return `<button class="nav-btn ${state.tab === tab ? "active" : ""}" data-action="tab" data-tab="${tab}">${label}</button>`;
    }

    function postMenuSheet() {
      const post = state.feed.find(p => p.id === state.postMenuId);
      if (!post) return "";
      const user = activeUser();
      const isOwn = post.authorEmail === user.email;
      return `<div class="overlay" data-action="close-post-menu-bg"><section class="sheet" data-stop>
        <div class="overlay-head"><h2 class="serif" style="font-size:20px;margin:0">Post options</h2><button class="close" data-action="close-post-menu">×</button></div>
        ${isOwn
          ? `<button class="lesson" data-action="edit-post" data-id="${post.id}"><span style="margin-right:8px">✏️</span>Edit my post</button>
             <button class="lesson" data-action="delete-post" data-id="${post.id}" style="color:#e5484d"><span style="margin-right:8px">🗑</span>Delete my post</button>`
          : `<button class="lesson" data-action="report-post" data-id="${post.id}" style="color:#f5a524"><span style="margin-right:8px">⚠️</span>Report this post</button>`}
      </section></div>`;
    }

    function reportsOverlay() {
      const user = activeUser();
      const isDM = user.storeId === "DISTRICT";
      const reports = isDM
        ? state.disciplinaryReports
        : state.disciplinaryReports.filter(r => r.storeId === user.storeId);
      const typeBadge = t => {
        const map = { coaching: ["#5b8def","#1a2540","Coaching"], "written-warning": ["#f5a524","#241a08","Written Warning"], "final-warning": ["#e5484d","#240a0b","Final Warning"], pip: ["#c6ff3a","#0a1500","PIP"] };
        const [clr, bg, label] = map[t] || ["#888","#111",t];
        return `<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:${bg};color:${clr};border:1px solid ${clr}33">${label}</span>`;
      };
      const storeLabel = sid => { const s = stores.find(x => x.id === sid); return s ? s.name : sid; };
      const reportRows = reports.length
        ? reports.map(r => `<div class="card" style="margin-bottom:10px;padding:14px 16px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              ${typeBadge(r.type)}
              ${isDM ? `<span style="font-size:10px;color:var(--muted)">${storeLabel(r.storeId)}</span>` : ""}
              <span style="font-size:10px;color:var(--muted);margin-left:auto">${r.date}</span>
            </div>
            <div style="font-size:13px;font-weight:700;margin-bottom:4px">${esc(r.employeeName)}</div>
            <div style="font-size:12px;color:var(--body);line-height:1.45">${esc(r.notes)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:6px">Issued by ${esc(r.issuedBy)}</div>
          </div>`).join("")
        : `<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:13px">No reports on file</div>`;
      const newForm = state.newReportOpen ? `
        <div class="card" style="padding:14px 16px;margin-top:4px" data-stop>
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">New Report</div>
          <div class="field"><label>Employee name</label><input data-field="rep-name" placeholder="Full name"></div>
          <div class="field"><label>Type</label><select data-field="rep-type" style="width:100%;padding:10px 12px;background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-size:13px">
            <option value="coaching">Coaching</option>
            <option value="written-warning">Written Warning</option>
            <option value="final-warning">Final Warning</option>
            <option value="pip">Performance Improvement Plan</option>
          </select></div>
          <div class="field"><label>Notes</label><textarea data-field="rep-notes" style="width:100%;min-height:80px;background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);padding:10px 12px;resize:none;font:13px Inter" placeholder="Summary of conversation..."></textarea></div>
          <button class="primary" data-action="submit-report" style="width:100%;margin-top:4px">Save report</button>
          <button class="secondary" data-action="cancel-new-report" style="width:100%;margin-top:8px">Cancel</button>
        </div>` : `<button class="primary" data-action="open-new-report" style="width:100%;margin-top:4px">+ New report</button>`;
      return `<section class="full-overlay">
        <div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">${isDM ? "District Reports" : "Store Reports"}</h2><button class="close" data-action="close-reports">×</button></div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${isDM ? "All stores · District 4" : `Store ${user.storeId} · ${activeStore().name}`}</div>
        ${reportRows}
        ${newForm}
      </section>`;
    }

    function overlays() {
      return [
        state.notifOpen ? notificationsOverlay() : "",
        state.infoOpen ? infoSheet() : "",
        state.composeOpen ? composeSheet() : "",
        state.flairOpen ? flairSheet() : "",
        state.settingsOpen ? settingsOverlay() : "",
        state.calendarOpen ? calendarOverlay() : "",
        state.train ? trainOverlay() : "",
        state.postMenuId !== null ? postMenuSheet() : "",
        state.reportsOpen ? reportsOverlay() : "",
        state.toast ? `<div class="toast">${esc(state.toast)}</div>` : ""
      ].join("");
    }

    function notificationsOverlay() {
      return `<section class="full-overlay"><div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">Notifications</h2><button class="close" data-action="close-notifications">×</button></div>${state.notifications.map(n => `<div class="notif"><div style="display:flex;gap:10px"><div>${n.icon}</div><div><div style="font-size:13px;font-weight:800">${n.title}</div><div class="post-time">${n.time}</div><div style="font-size:12px;color:var(--body);margin-top:4px">${n.body}</div></div></div></div>`).join("")}</section>`;
    }

    function infoSheet() {
      return `<div class="overlay" data-action="close-info-bg"><section class="sheet" data-stop><div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">How Buddy works</h2><button class="close" data-action="close-info">×</button></div><p><strong>Earn charges from sales.</strong> Any sale can earn a Feed charge, piercing sales can earn Train charges, and ESA or warranty sales can earn Cheer charges.</p><p><strong>Spend charges to care for Buddy.</strong> Feed and Cheer apply instantly. Train takes you through a Playbook lesson and quiz.</p><p><strong>Level up together.</strong> XP unlocks new Buddy looks, and store milestones can award bonus XP to everyone on the team.</p></section></div>`;
    }

    function composeSheet() {
      const editing = state.editingPostId !== null;
      return `<div class="overlay"><section class="sheet"><div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">${editing ? "Edit post" : "New post"}</h2><button class="close" data-action="close-compose">×</button></div><textarea id="composeText" style="width:100%;min-height:116px;background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:var(--text);padding:12px;resize:none;font:13px Inter" placeholder="Share a win, update, or shoutout...">${esc(state.composeText)}</textarea><button class="primary" data-action="send-post" style="margin-top:12px" ${state.composeText.trim() ? "" : "disabled"}>${editing ? "Save changes" : "Send"}</button></section></div>`;
    }

    function flairSheet() {
      return `<div class="overlay"><section class="sheet"><div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">Choose flair</h2><button class="close" data-action="skip-flair">×</button></div>${["news","shoutout","update"].map(f => `<button class="lesson" data-action="select-flair" data-flair="${f}" style="${state.pendingFlair === f ? "background:#1c2410;border-color:var(--lime)" : ""}"><span class="flair ${f}">${f.toUpperCase()}</span><div class="post-time" style="margin-top:7px">${f === "news" ? "Company or district news" : f === "shoutout" ? "Recognize a teammate" : "Store or task update"}</div></button>`).join("")}<button class="primary" data-action="publish-post" style="margin-top:8px">Post${state.pendingFlair ? " as " + state.pendingFlair.toUpperCase() : ""}</button><button class="secondary" data-action="skip-flair" style="margin-top:8px;text-align:center">Post without a flair</button></section></div>`;
    }

    function settingsOverlay() {
      return `<section class="full-overlay">${state.settingsView === "menu" ? settingsMenu() : settingsDetail()}</section>`;
    }

    function settingsMenu() {
      const user = activeUser();
      return `<div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">Settings</h2><button class="close" data-action="close-settings">×</button></div><div style="display:flex;align-items:center;gap:10px;padding:12px 0 18px"><div class="avatar" style="width:40px;height:40px">${initials(user.name)}</div><div><div style="font-size:14px;font-weight:700">${user.name}</div><div style="font-size:11px;color:var(--muted)">${user.role} · Store ${user.storeId === "DISTRICT" ? "District" : user.storeId}</div></div></div><div class="settings-group-title">Account Settings</div><div class="card settings-group">${accountSettings.map(settingsRow).join("")}</div><div class="settings-group-title">Workplace Admin</div><div class="card settings-group">${adminSettings.map(settingsRow).join("")}</div><button class="secondary" data-action="logout" style="margin-top:24px;color:#e5484d;border-color:rgba(229,72,77,.25)">Sign out</button>`;
    }

    function settingsRow(item) {
      return `<button class="row-item" data-action="settings-item" data-key="${item[0]}"><span class="row-icon">${item[1]}</span><span>${item[2]}</span><span class="chev">›</span></button>`;
    }

    function settingsDetail() {
      const title = [...accountSettings, ...adminSettings].find(i => i[0] === state.settingsView)?.[2] || "Settings";
      const saveable = ["profile", "admin-general"];
      const saveBtn = saveable.includes(state.settingsView) ? `<button class="primary" data-action="save-settings" style="margin-top:24px;width:100%">Save changes</button>` : "";
      return `<div class="overlay-head"><button class="close" data-action="settings-back">‹</button><h2 class="serif" style="font-size:22px;margin:0;flex:1;text-align:center">${title}</h2><button class="close" data-action="close-settings">×</button></div>${settingsFields(state.settingsView)}${saveBtn}`;
    }

    function settingsFields(key) {
      const t = state.toggles;
      const user = activeUser();
      const store = activeStore();
      const toggle = (name, label, sub = "") => `<div class="field" style="display:flex;align-items:center;gap:12px"><div><strong style="font-size:13px">${label}</strong>${sub ? `<div class="post-time" style="margin-top:4px">${sub}</div>` : ""}</div><button class="toggle ${t[name] ? "on" : ""}" data-action="toggle-field" data-key="${name}" aria-label="${label}"><span></span></button></div>`;
      const info = (label, value) => `<div class="field" style="display:flex;justify-content:space-between;gap:12px"><span style="font-size:13px">${label}</span><strong style="font-size:13px;color:var(--soft);text-align:right">${value}</strong></div>`;
      const text = (label, value, fieldKey) => `<div class="field"><label>${label}</label><input data-field="${fieldKey}" value="${value}"></div>`;
      const map = {
        profile: [text("Full name", user.name, "name"), text("Email", user.email, "email"), info("Role", user.role), info("Store", userStoreLabel(user))],
        notifications: [toggle("notifPush", "Push notifications", "Milestones, charges, shoutouts"), toggle("notifEmail", "Email digest", "Weekly summary email"), toggle("notifAchievements", "Achievement alerts", "When you or your store hit a milestone")],
        appearance: [`<div class="field"><label>Theme</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button class="primary" style="background:var(--panel);color:var(--muted);border:1px solid rgba(255,255,255,.08)">Light</button><button class="primary">Dark</button></div></div>`, toggle("soundOn", "App sounds", "Click sound on taps and reactions")],
        language: [info("Language", "English (US)"), info("Region", "Colorado, US"), info("Time zone", "Mountain Time")],
        security: [toggle("twoFactor", "Two-factor authentication", "Require a code at sign-in"), info("Change password", "Update"), info("Last sign-in", "Today, 9:41 AM")],
        connected: [info("Microsoft", "Connected"), info("Point of sale", "Connect")],
        "admin-general": [text("District name", state.districtName, "districtName"), info("Default time zone", "Mountain Time")],
        "admin-members": [info("Active members", "24"), info("Invite a member", "Invite")],
        "admin-teams": [info("Teams", "5 stores"), info("Create a team", "New team")],
        "admin-roles": [toggle("roleManagerEdit", "Managers can edit playbook"), toggle("roleAssocView", "Associates can view district data")],
        "admin-security": [toggle("adminReq2fa", "Require 2FA for all managers"), info("Session timeout", "12 hours")],
        "admin-integrations": [toggle("intPos", "Point-of-sale sync", "Live sales and commission data"), toggle("intSlack", "Slack alerts", "Post milestones to #store-wins")],
        "admin-billing": [info("Plan", "BanterONE Enterprise"), info("Billing contact", "Update")],
        "admin-compliance": [toggle("compRetention", "Data retention (24 months)"), info("Export district data", "Export")],
        "admin-workflow": [toggle("wfAutoCharges", "Auto-issue Buddy charges", "On qualifying sale sync"), toggle("wfAutoPost", "Auto-post store milestones to feed")]
      };
      return (map[key] || []).join("");
    }

    function calendarOverlay() {
      const m = state.calendarMonth;
      const y = state.calendarYear;
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const startDay = new Date(y, m, 1).getDay();
      const today = new Date();
      const isCurrentMonth = today.getMonth() === m && today.getFullYear() === y;
      const todayDate = today.getDate();
      const allEvents = [...calEvents, ...customCalEvents].filter(e => e.month === undefined || e.month === m);
      const selectedDay = state.calendarSelectedDay || (isCurrentMonth ? todayDate : 1);
      const dayEvents = allEvents.filter(e => e.day === selectedDay);

      let cells = "";
      for (let i = 0; i < startDay; i++) cells += `<div class="cal-cell empty"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const evts = allEvents.filter(e => e.day === d);
        const isTd = isCurrentMonth && d === todayDate;
        const isSel = d === selectedDay;
        cells += `<div class="cal-cell ${isTd ? "today" : ""}" data-action="cal-select-day" data-day="${d}" style="${isSel ? "outline:1px solid var(--lime);outline-offset:-1px;border-radius:4px;" : ""}cursor:pointer;">
          <div class="cal-day">${d}</div>
          <div class="cal-dots">${evts.slice(0, 4).map(e => `<div class="cal-dot" style="background:${calCategories[e.cat]?.color || "#888"}"></div>`).join("")}${evts.length > 4 ? `<div style="font-size:7px;color:var(--muted)">+${evts.length - 4}</div>` : ""}</div>
        </div>`;
      }

      const editForm = state.calendarEditEvent !== null ? `
        <div class="cal-form">
          <input data-field="cal-event-name" placeholder="Event name" value="">
          <select data-field="cal-event-cat">
            ${Object.entries(calCategories).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join("")}
          </select>
          <div class="cal-form-actions">
            <button style="background:var(--lime);color:var(--bg)" data-action="cal-save-event">Save</button>
            <button style="background:rgba(255,255,255,.08);color:var(--text)" data-action="cal-cancel-event">Cancel</button>
          </div>
        </div>` : "";

      return `
        <section class="full-overlay" style="padding-top:48px">
          <div class="overlay-head">
            <h2 class="serif" style="font-size:22px;margin:0">Calendar</h2>
            <button class="close" data-action="close-calendar">×</button>
          </div>
          <div class="cal-month-bar">
            <button data-action="cal-prev">‹</button>
            <div class="cal-month-title">${monthNames[m]} ${y}</div>
            <button data-action="cal-next">›</button>
          </div>
          <div class="cal-grid">
            ${["SUN","MON","TUE","WED","THU","FRI","SAT"].map(d => `<div class="cal-head">${d}</div>`).join("")}
            ${cells}
          </div>
          <div class="cal-day-detail">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div class="section-title" style="font-size:13px">${monthNames[m]} ${selectedDay}</div>
              <div style="font-size:11px;color:var(--muted)">${dayEvents.length} event${dayEvents.length !== 1 ? "s" : ""}</div>
            </div>
            ${dayEvents.length ? dayEvents.map(e => `
              <div class="cal-event-row">
                <div class="cal-event-dot" style="background:${calCategories[e.cat]?.color || "#888"}"></div>
                <div style="flex:1"><div class="cal-event-text">${esc(e.text)}</div><div class="cal-event-cat">${calCategories[e.cat]?.label || e.cat}</div></div>
              </div>`).join("") : `<div style="text-align:center;color:var(--muted);font-size:12px;padding:18px 0">No events</div>`}
            <button class="cal-add-btn" data-action="cal-add-event">+ Add event</button>
            ${editForm}
          </div>
          <div class="cal-legend">
            ${Object.entries(calCategories).map(([k, v]) => `<div class="cal-legend-item"><div class="cal-legend-dot" style="background:${v.color}"></div>${v.label}</div>`).join("")}
          </div>
        </section>`;
    }

    function trainOverlay() {
      const tr = state.train;
      if (tr.step === "pick") {
        return `<section class="full-overlay"><div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">What would you like to learn?</h2><button class="close" data-action="close-train">×</button></div>${lessons.map(l => `<button class="lesson" data-action="choose-lesson" data-id="${l.id}"><strong>${l.title}</strong><div class="post-time" style="margin-top:4px">${l.meta}${l.pdf ? ' · <span style="color:var(--lime)">📄 PDF</span>' : ''}</div></button>`).join("")}</section>`;
      }
      const lesson = lessons.find(l => l.id === tr.lessonId) || lessons[0];
      if (tr.step === "article") {
        return `<section class="full-overlay"><div class="overlay-head"><div><div class="eyebrow">Playbook · Training</div><h2 class="serif" style="font-size:24px;margin:2px 0 0">${lesson.title}</h2></div><button class="close" data-action="close-train">×</button></div><p style="font-size:13px;line-height:1.55;color:var(--body)">${lesson.body}</p>${lesson.pdf ? `<a href="docs/${encodeURIComponent(lesson.pdf)}" target="_blank" rel="noreferrer" style="display:block;padding:10px 14px;background:rgba(198,255,58,.08);border:1px solid rgba(198,255,58,.2);border-radius:10px;color:var(--lime);font-size:12px;font-weight:700;text-decoration:none;margin-bottom:12px">📄 Open ${lesson.pdf.replace('.pdf','')}</a>` : ''}<button class="primary" data-action="train-next">Finished reading</button></section>`;
      }
      if (tr.step === "quiz") {
        const allAnswered = tr.answers.filter(a => a !== undefined).length === lesson.quiz.length;
        return `<div class="overlay"><section class="modal-card"><div class="overlay-head"><div><div class="eyebrow">Quiz · 3 questions</div><h2 class="serif" style="font-size:24px;margin:2px 0 0">${lesson.title}</h2></div><button class="close" data-action="close-train">×</button></div>${lesson.quiz.map((q, qi) => `<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">${qi + 1}. ${q.q}</div>${q.options.map((opt, oi) => `<button class="answer ${tr.answers[qi] === oi ? "selected" : ""}" data-action="answer" data-q="${qi}" data-a="${oi}">${opt}</button>`).join("")}</div>`).join("")}<button class="primary" data-action="submit-quiz" ${allAnswered ? "" : "disabled"}>Submit answers</button></section></div>`;
      }
      return `<section class="full-overlay" style="display:grid;place-items:center;text-align:center"><div><div style="font-size:42px">${tr.perfect ? "🌟" : tr.passed ? "🎉" : "📖"}</div><h2 class="serif" style="font-size:28px;margin:8px 0">${tr.perfect ? "Perfect score!" : tr.passed ? "Training complete!" : "Not quite — review and retry"}</h2><p style="font-size:13px;color:var(--body);line-height:1.45">${tr.passed ? `Scored ${tr.correct}/3 · +${tr.xp} XP${tr.perfect ? " (double!)" : ""}, Bond +${tr.perfect ? 12 : 8}%` : `Scored ${tr.correct}/3 — need at least 2/3 to pass.`}</p><button class="primary" data-action="${tr.passed ? "close-train" : "retry-train"}">${tr.passed ? "Done" : "Retry quiz"}</button></div></section>`;
    }

    const screenWrap = document.getElementById("screen-wrap");
    const navWrap = document.getElementById("nav-wrap");
    const overlayWrap = document.getElementById("overlay-wrap");

    function render() {
      const screens = { login: loginScreen, home: homeScreen, store: storeScreen, buddy: buddyScreen, playbook: playbookScreen, arena: arenaScreen };
      const prevTab = screenWrap.dataset.tab;
      const savedScroll = screenWrap.scrollTop;
      screenWrap.innerHTML = screens[state.tab]();
      screenWrap.dataset.tab = state.tab;
      if (state.tab === prevTab && savedScroll) {
        screenWrap.scrollTop = savedScroll;
        requestAnimationFrame(() => { screenWrap.scrollTop = savedScroll; });
      } else if (state.tab !== prevTab) {
        screenWrap.scrollTop = 0;
      }
      navWrap.innerHTML = nav();
      overlayWrap.innerHTML = overlays();
      const compose = document.getElementById("composeText");
      if (compose) {
        compose.focus();
        compose.selectionStart = compose.selectionEnd = compose.value.length;
        compose.addEventListener("input", event => {
          state.composeText = event.target.value;
          const send = app.querySelector('[data-action="send-post"]');
          if (send) send.disabled = !state.composeText.trim();
        });
      }
    }

    app.addEventListener("click", event => {
      const el = event.target.closest("[data-action]");
      const stop = event.target.closest("[data-stop]");
      if (stop && !el) return;
      if (stop && el && !stop.contains(el)) return;
      if (!el) return;
      const action = el.dataset.action;
      if (action === "login") {
        const user = activeUser();
        const entered = (app.querySelector('[data-field="password"]')?.value || "").trim().toUpperCase();
        const expected = passwordInitials(user.name);
        if (entered !== expected) {
          setState({ loginError: `Use ${user.name}'s first and last initials.` });
          return;
        }
        const store = activeStore();
        const sub = submissionForStore(store.id);
        const feedCharges = Math.min(3, Math.floor(sub.bold / 500));
        const trainCharges = Math.min(2, sub.ep);
        const cheerCharges = Math.min(3, sub.esa);
        state.tab = "home"; state.loginError = "";
        state.charges = { feed: feedCharges, train: trainCharges, cheer: cheerCharges };
        state.chargesEarned = true;
        render();
        loadUserData(user.email).then(() => render());
        subscribeToSharedData();
        seedFeedIfEmpty();
        saveState();
      }
      if (action === "toggle-pw") setState({ pwVisible: !state.pwVisible });
      if (action === "stay") setState({ staySignedIn: !state.staySignedIn });
      if (action === "toggle-demo") setState({ demoOpen: !state.demoOpen });
      if (action === "tab") setState({ tab: el.dataset.tab });
      if (action === "arena-scope") setState({ arenaScope: el.dataset.scope });
      if (action === "individual-metric") setState({ individualMetric: el.dataset.metric });
      if (action === "open-notifications") setState({ notifOpen: true, unread: 0 });
      if (action === "close-notifications") setState({ notifOpen: false });
      if (action === "open-info") setState({ infoOpen: true });
      if (action === "close-info" || action === "close-info-bg") setState({ infoOpen: false });
      if (action === "open-settings") setState({ settingsOpen: true, settingsView: "menu" });
      if (action === "close-settings") setState({ settingsOpen: false });
      if (action === "logout") {
        unsubscribeAll();
        localStorage.removeItem("banterone_session");
        Object.assign(state, { tab: "login", settingsOpen: false, feed: [], disciplinaryReports: [], charges: { feed: 0, train: 0, cheer: 0 }, chargesEarned: false, myReactions: {}, buddy: { level: 2, xp: 140, xpNext: 250, care: 72, spark: 45, bond: 61 } });
        render();
      }
      if (action === "settings-back") setState({ settingsView: "menu" });
      if (action === "settings-item") setState({ settingsView: el.dataset.key });
      if (action === "save-settings") {
        const inputs = {};
        overlayWrap.querySelectorAll("[data-field]").forEach(inp => { inputs[inp.dataset.field] = inp.value.trim(); });
        if (state.settingsView === "profile") {
          const email = activeUser().email;
          state.userOverrides[email] = { ...state.userOverrides[email], name: inputs.name };
        } else if (state.settingsView === "admin-general") {
          state.districtName = inputs.districtName || state.districtName;
        }
        saveState();
        render();
        showToast("Changes saved");
      }
      if (action === "toggle-field") {
        state.toggles[el.dataset.key] = !state.toggles[el.dataset.key];
        saveState(); render();
      }
      if (action === "react") {
        const postId = el.dataset.id;
        const key = el.dataset.key;
        const rKey = `${postId}_${key}`;
        const post = state.feed.find(p => p.id === postId);
        if (post) {
          if (state.myReactions[rKey]) {
            post.reactions[key] = (post.reactions[key] || 1) - 1;
            delete state.myReactions[rKey];
            db.collection("feed").doc(postId).update({ [`reactions.${key}`]: firebase.firestore.FieldValue.increment(-1) }).catch(console.error);
          } else {
            post.reactions[key] = (post.reactions[key] || 0) + 1;
            state.myReactions[rKey] = true;
            db.collection("feed").doc(postId).update({ [`reactions.${key}`]: firebase.firestore.FieldValue.increment(1) }).catch(console.error);
          }
          saveUserData(); render();
        }
      }
      if (action === "go-store") setState({ tab: "store" });
      if (action === "go-arena") setState({ tab: "arena" });
      if (action === "open-post-menu") setState({ postMenuId: el.dataset.id });
      if (action === "close-post-menu" || action === "close-post-menu-bg") setState({ postMenuId: null });
      if (action === "delete-post") {
        db.collection("feed").doc(el.dataset.id).delete().catch(console.error);
        setState({ postMenuId: null }); showToast("Post deleted");
      }
      if (action === "edit-post") {
        const post = state.feed.find(p => p.id === el.dataset.id);
        if (post) setState({ postMenuId: null, editingPostId: post.id, composeText: post.text, composeOpen: true });
      }
      if (action === "report-post") {
        setState({ postMenuId: null });
        showToast("Post reported");
      }
      if (action === "open-reports") setState({ reportsOpen: true });
      if (action === "close-reports") setState({ reportsOpen: false, newReportOpen: false });
      if (action === "open-new-report") setState({ newReportOpen: true });
      if (action === "cancel-new-report") setState({ newReportOpen: false });
      if (action === "submit-report") {
        const name = overlayWrap.querySelector("[data-field='rep-name']")?.value.trim();
        const type = overlayWrap.querySelector("[data-field='rep-type']")?.value;
        const notes = overlayWrap.querySelector("[data-field='rep-notes']")?.value.trim();
        if (name && notes) {
          const user = activeUser();
          db.collection("reports").add({ employeeEmail: "", employeeName: name, storeId: user.storeId, type, date: new Date().toISOString().slice(0,10), createdAt: firebase.firestore.FieldValue.serverTimestamp(), notes, issuedBy: user.name }).catch(console.error);
          setState({ newReportOpen: false }); showToast("Report saved");
        } else { showToast("Please fill in all fields"); }
      }
      if (action === "open-compose") setState({ composeOpen: true, editingPostId: null });
      if (action === "close-compose") setState({ composeOpen: false, composeText: "", editingPostId: null });
      if (action === "send-post" && state.composeText.trim()) {
        if (state.editingPostId !== null) {
          db.collection("feed").doc(state.editingPostId).update({ text: state.composeText.trim() }).catch(console.error);
          setState({ editingPostId: null, composeOpen: false, composeText: "" }); showToast("Post updated");
        } else {
          setState({ composeOpen: false, flairOpen: true });
        }
      }
      if (action === "select-flair") setState({ pendingFlair: el.dataset.flair });
      if (action === "publish-post" || action === "skip-flair") {
        const flair = action === "skip-flair" ? "update" : state.pendingFlair;
        const user = activeUser();
        db.collection("feed").add({ name: user.name, initials: initials(user.name), authorEmail: user.email, timestamp: firebase.firestore.FieldValue.serverTimestamp(), flair, pinned: false, text: state.composeText.trim(), reactions: { like: 0, heart: 0, laugh: 0, fire: 0, party: 0 } }).catch(console.error);
        setState({ flairOpen: false, composeText: "", pendingFlair: "shoutout" });
      }
      if (action === "feed-buddy" && state.charges.feed > 0) {
        state.charges.feed -= 1; state.buddy.xp += 10; state.buddy.care = Math.min(100, state.buddy.care + 5);
        saveState(); showToast("Fed Buddy · +10 XP");
      }
      if (action === "cheer-buddy" && state.charges.cheer > 0) {
        state.charges.cheer -= 1; state.buddy.xp += 15; state.buddy.spark = Math.min(100, state.buddy.spark + 6); state.buddy.bond = Math.min(100, state.buddy.bond + 3);
        saveState(); showToast("Cheered Buddy · +15 XP");
      }
      if (action === "start-train") setState({ train: { step: "pick", lessonId: null, answers: [] } });
      if (action === "open-lesson") setState({ tab: "playbook", train: { step: "article", lessonId: el.dataset.id, answers: [] } });
      if (action === "choose-lesson") setState({ train: { step: "article", lessonId: el.dataset.id, answers: [] } });
      if (action === "train-next") setState({ train: { ...state.train, step: "quiz", answers: [] } });
      if (action === "answer") {
        state.train.answers[Number(el.dataset.q)] = Number(el.dataset.a);
        render();
      }
      if (action === "submit-quiz") {
        const lesson = lessons.find(l => l.id === state.train.lessonId);
        if (!lesson || state.train.answers.filter(a => a !== undefined).length !== lesson.quiz.length) return;
        const correct = lesson.quiz.reduce((sum, q, i) => sum + (state.train.answers[i] === q.correct ? 1 : 0), 0);
        const passed = correct >= 2;
        const perfect = correct === 3;
        if (passed) {
          state.charges.train -= 1;
          state.buddy.xp += perfect ? 80 : 40;
          state.buddy.bond = Math.min(100, state.buddy.bond + (perfect ? 12 : 8));
        }
        setState({ train: { ...state.train, step: "result", correct, passed, perfect, xp: perfect ? 80 : 40 } });
      }
      if (action === "retry-train") setState({ train: { ...state.train, step: "quiz", answers: [] } });
      if (action === "close-train") setState({ train: null });
      if (action === "open-calendar") setState({ calendarOpen: true, calendarSelectedDay: null });
      if (action === "close-calendar") setState({ calendarOpen: false, calendarEditEvent: null });
      if (action === "cal-prev") {
        let nm = state.calendarMonth - 1, ny = state.calendarYear;
        if (nm < 0) { nm = 11; ny--; }
        setState({ calendarMonth: nm, calendarYear: ny, calendarSelectedDay: null });
      }
      if (action === "cal-next") {
        let nm = state.calendarMonth + 1, ny = state.calendarYear;
        if (nm > 11) { nm = 0; ny++; }
        setState({ calendarMonth: nm, calendarYear: ny, calendarSelectedDay: null });
      }
      if (action === "cal-select-day") setState({ calendarSelectedDay: Number(el.dataset.day) });
      if (action === "cal-add-event") setState({ calendarEditEvent: true });
      if (action === "cal-cancel-event") setState({ calendarEditEvent: null });
      if (action === "cal-save-event") {
        const nameInput = app.querySelector('[data-field="cal-event-name"]');
        const catSelect = app.querySelector('[data-field="cal-event-cat"]');
        if (nameInput && nameInput.value.trim()) {
          customCalEvents.push({ day: state.calendarSelectedDay || 1, cat: catSelect.value, text: nameInput.value.trim(), month: state.calendarMonth });
          setState({ calendarEditEvent: null });
          showToast("Event added");
        }
      }
    });

    app.addEventListener("change", event => {
      const el = event.target.closest("[data-action]");
      if (!el) return;
      if (el.dataset.action === "select-user") {
        setState({ selectedUserEmail: el.value, loginError: "" });
      }
    });

    // Auto-resume session from localStorage
    if (state.selectedUserEmail && state.tab !== "login") {
      render();
      subscribeToSharedData();
      seedFeedIfEmpty();
      loadUserData(state.selectedUserEmail).then(() => render());
    } else {
      render();
    }
  </script>
</body>
</html>
