<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>BanterONE</title>
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --sheet: #0d0d0d;
      --disabled: #0f0f0f;
      --lime: #C6FF3A;
      --blue: #5b8def;
      --red: #e5484d;
      --text: #f5f5f0;
      --body: #d5d5cf;
      --soft: #c9c9c0;
      --muted: #8a8a82;
      --eyebrow: #7a7a72;
      --off: #4a4a46;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .phone {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 520px) {
      body { min-height: 100vh; display: grid; place-items: center; }
      .phone { width: min(100vw, 390px); height: min(100vh, 844px); border-radius: 46px; border: 10px solid #060606; box-shadow: 0 40px 80px rgba(0,0,0,0.22); }
      .phone:before {
        content: "";
        position: absolute;
        top: 11px;
        left: 50%;
        width: 126px;
        height: 37px;
        transform: translateX(-50%);
        border-radius: 24px;
        background: #000;
        z-index: 30;
      }
    }

    @keyframes glowPulse { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes bannerSlideIn { from { opacity: 0; transform: translateY(-110%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bannerSlideOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-110%); } }
    .in-app-banner {
      position: absolute; top: 12px; left: 10px; right: 10px; z-index: 200;
      background: rgba(20,20,20,.96); border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 10px 12px; display: flex; align-items: center; gap: 10px;
      backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,.5);
      animation: bannerSlideIn .3s cubic-bezier(.2,.8,.4,1) forwards;
      cursor: pointer;
    }
    .in-app-banner.hiding { animation: bannerSlideOut .25s ease-in forwards; }
    .banner-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--panel); display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
    .reply-area { border-top: 1px solid rgba(255,255,255,.06); margin-top: 8px; padding-top: 8px; }
    .reply-bubble { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
    .reply-text { background: var(--panel); border-radius: 10px; padding: 7px 10px; font-size: 12px; color: var(--body); flex: 1; line-height: 1.4; }
    .reply-meta { font-size: 10px; font-weight: 700; color: var(--soft); margin-bottom: 2px; }
    .reply-input-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
    .reply-input { flex: 1; background: var(--panel); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 7px 12px; font-size: 12px; color: var(--text); outline: none; font-family: inherit; }
    .reply-send { width: 30px; height: 30px; border-radius: 50%; background: var(--lime); border: none; display: grid; place-items: center; font-size: 14px; flex-shrink: 0; cursor: pointer; }
    @keyframes buddyBlink { 0%, 96%, 100% { opacity: 1; } 98% { opacity: 0; } }
    @keyframes buddyWag { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(3deg); } 75% { transform: rotate(-3deg); } }
    @keyframes buddyJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    .glow {
      position: absolute;
      inset: 0 0 auto;
      height: 280px;
      pointer-events: none;
      background: radial-gradient(ellipse 480px 260px at 50% -70px, rgba(198,255,58,.13), transparent);
      animation: glowPulse 3.2s ease-in-out infinite;
      z-index: 0;
    }

    #screen-wrap {
      position: relative;
      z-index: 1;
      height: 100%;
      overflow: auto;
      scrollbar-width: none;
    }
    #screen-wrap::-webkit-scrollbar { display: none; }
    .screen {
      padding: 56px 18px 96px;
    }

    .screen.top-space { padding-top: 56px; }
    .login { padding: 64px 22px 40px; display: flex; flex-direction: column; }

    .wordmark { font-family: "Instrument Serif", serif; font-size: 32px; line-height: 1; }
    .wordmark strong { color: var(--lime); font-style: italic; font-weight: 400; }
    .wordmark span { color: var(--text); }
    .muted-kicker { margin-top: 6px; font-size: 10px; letter-spacing: .12em; color: var(--eyebrow); text-transform: uppercase; }

    .top-cluster {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .icon-button, .points-badge {
      height: 34px;
      border-radius: 10px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-button { width: 34px; font-size: 16px; }
    .points-badge {
      gap: 5px;
      padding: 0 8px;
      border-color: rgba(198,255,58,.2);
      text-align: left;
    }
    .points-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--lime);
      color: var(--bg);
      display: grid;
      place-items: center;
      font-size: 9px;
      font-weight: 800;
    }
    .points-value { display: block; font-size: 11px; font-weight: 800; line-height: 1; }
    .points-label { display: block; font-size: 6.5px; letter-spacing: .08em; color: var(--eyebrow); line-height: 1.2; margin-top: 2px; }
    .badge {
      position: absolute;
      top: -3px;
      right: -3px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      padding: 0 3px;
      display: grid;
      place-items: center;
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.5);
    }

    .store-card {
      border-radius: 20px;
      padding: 18px;
      margin: 14px 0;
      box-shadow: 0 10px 28px rgba(0,0,0,.55);
    }

    .eyebrow { font-size: 10px; letter-spacing: .12em; color: var(--lime); font-weight: 700; text-transform: uppercase; }
    .serif { font-family: "Instrument Serif", serif; font-weight: 400; }
    .store-title { margin-top: 2px; font-size: 24px; color: var(--text); }
    .caption { margin-top: 2px; color: var(--muted); font-size: 12px; }

    .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .kpi { padding: 14px; min-height: 103px; }
    .kpi-label { font-size: 9px; letter-spacing: .1em; color: var(--eyebrow); text-transform: uppercase; }
    .kpi-value { margin-top: 4px; font-family: "Instrument Serif", serif; font-size: 26px; color: var(--text); }
    .kpi-value.lime { color: var(--lime); }
    .kpi-note { font-size: 10px; color: var(--eyebrow); }

    .section-row { display: flex; align-items: center; justify-content: space-between; margin: 0 0 8px; }
    .section-title { font-size: 14px; font-weight: 700; }
    .link-action { border: 0; background: transparent; color: var(--lime); font-size: 11px; font-weight: 700; padding: 0; }
    .neon-spacer {
      height: 1px;
      margin: 16px 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(198,255,58,.28), rgba(198,255,58,.9), rgba(198,255,58,.28), transparent);
      box-shadow: 0 0 12px rgba(198,255,58,.22);
      position: relative;
    }
    .neon-spacer:after {
      content: "";
      position: absolute;
      left: 50%;
      top: -2px;
      width: 34px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(198,255,58,.2);
      filter: blur(5px);
    }
    .neon-spacer.compact { margin: 12px 0; opacity: .82; }
    .neon-spacer.left {
      width: 118px;
      margin: 12px 0 14px;
      background: linear-gradient(90deg, rgba(198,255,58,.95), rgba(198,255,58,.18), transparent);
    }
    .neon-spacer.left:after { left: 18px; width: 42px; transform: none; }
    .plus {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--lime);
      color: var(--bg);
      display: inline-grid;
      place-items: center;
      margin-left: 5px;
      font-weight: 800;
      font-size: 12px;
    }

    .post { padding: 14px; margin-bottom: 10px; }
    .post-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--lime);
      color: var(--bg);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .post-name { font-size: 12px; font-weight: 700; }
    .post-time { font-size: 10px; color: var(--eyebrow); }
    .post-body { color: var(--body); font-size: 13px; line-height: 1.4; margin-bottom: 10px; }
    .reactions { display: flex; gap: 6px; flex-wrap: wrap; }
    .reaction {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--soft);
      font-size: 11px;
    }
    .reaction.active {
      background: rgba(198,255,58,.12);
      border-color: rgba(198,255,58,.4);
      color: var(--lime);
    }
    .flair {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .06em;
    }
    .flair.news { color: var(--blue); background: rgba(91,141,239,.14); border: 1px solid rgba(91,141,239,.3); }
    .flair.shoutout { color: var(--lime); background: rgba(198,255,58,.12); border: 1px solid rgba(198,255,58,.3); }
    .flair.update { color: #f5a524; background: rgba(245,165,36,.14); border: 1px solid rgba(245,165,36,.3); }
    .flair.coaching { color: #f5a524; background: rgba(245,165,36,.12); border: 1px solid rgba(245,165,36,.28); }
    .flair.milestone { color: #c084fc; background: rgba(192,132,252,.12); border: 1px solid rgba(192,132,252,.28); }
    .pinned { margin-left: auto; color: var(--lime); font-size: 9px; font-weight: 800; letter-spacing: .08em; }

    .leader-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      box-shadow: none;
      border-radius: 14px;
    }
    .rank { width: 26px; height: 26px; border-radius: 8px; background: var(--bg); color: var(--eyebrow); display: grid; place-items: center; font-size: 11px; font-weight: 700; }
    .store-chip { background: var(--bg); border: 1px solid rgba(198,255,58,.25); border-radius: 8px; color: var(--lime); padding: 5px 7px; font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 700; }

    .charges { display: flex; gap: 8px; margin-bottom: 14px; }
    .charge { flex: 1; text-align: center; padding: 8px 4px; border-radius: 12px; box-shadow: none; }
    .charge span { display: block; color: var(--eyebrow); font-size: 9px; }
    .charge strong { display: block; color: var(--lime); font-size: 15px; margin-top: 2px; }
    .helper-link { border: 0; background: transparent; color: var(--eyebrow); width: 100%; text-align: center; font-size: 11px; margin-bottom: 14px; }
    .helper-link span { color: var(--lime); }

    .buddy-card {
      overflow: hidden;
      border-radius: 22px;
      border-color: rgba(198,255,58,.16);
      box-shadow: 0 0 22px rgba(198,255,58,.08), 0 10px 28px rgba(0,0,0,.5);
      margin-bottom: 14px;
    }
    .buddy-art {
      height: 200px;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: var(--lime);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: .08em;
    }
    .buddy-art img { height: 180px; width: auto; object-fit: contain; }
    .level-pill { position: absolute; top: 12px; left: 12px; border: 1px solid var(--lime); border-radius: 999px; padding: 4px 10px; background: var(--bg); color: var(--lime); font-size: 10px; font-weight: 800; font-family: Inter, sans-serif; }
    .buddy-inner { padding: 16px; }
    .stat { margin-bottom: 8px; }
    .stat-row { display: flex; justify-content: space-between; color: var(--soft); font-size: 11px; margin-bottom: 3px; }
    .track { height: 5px; border-radius: 3px; background: #232320; overflow: hidden; }
    .fill { height: 100%; border-radius: 3px; background: var(--lime); }
    .fill.blue { background: var(--blue); }
    .buddy-actions { display: flex; gap: 8px; margin-top: 14px; }
    .buddy-actions button {
      flex: 1;
      border-radius: 12px;
      padding: 9px;
      color: var(--text);
      background: transparent;
      border: 1px solid rgba(255,255,255,.16);
      font-size: 12px;
      font-weight: 600;
    }
    .buddy-actions button:disabled { color: var(--off); background: var(--disabled); border-color: rgba(255,255,255,.06); cursor: default; }

    .evolution { padding: 14px; margin-bottom: 18px; }
    .pill-nav {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
    }
    .pill-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2px;
      background: #131313e8;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 28px;
      padding: 8px 8px;
      box-shadow: 0 16px 34px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .nav-slot {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .nav-btn.active { background: var(--lime); color: var(--bg); }
    .buddy-slot {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .buddy-nav {
      width: 56px;
      height: 56px;
      margin-top: -8px;
      border-radius: 50%;
      border: 1px solid rgba(198,255,58,.3);
      background: #1c1c1a;
      color: var(--lime);
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 24px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px #131313, 0 6px 16px rgba(0,0,0,.5);
    }
    .buddy-nav.active { background: var(--lime); color: var(--bg); border: 0; box-shadow: 0 0 0 4px #131313, 0 6px 18px rgba(198,255,58,.5); }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: rgba(0,0,0,.58);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .full-overlay {
      position: absolute;
      inset: 0;
      z-index: 38;
      background: var(--sheet);
      padding: 56px 18px 24px;
      overflow: auto;
    }
    .sheet {
      max-height: 78%;
      overflow: auto;
      background: var(--sheet);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px 24px 0 0;
      padding: 18px;
      box-shadow: 0 -20px 50px rgba(0,0,0,.55);
    }
    .modal-card {
      width: calc(100% - 36px);
      margin: auto 18px;
      align-self: center;
      background: var(--sheet);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.7);
    }
    .overlay-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .close { width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: var(--text); font-size: 18px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .primary {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px;
      background: var(--lime);
      color: var(--bg);
      font-weight: 800;
      font-size: 13px;
    }
    .primary:disabled { background: #232320; color: #5a5a56; cursor: default; }
    .secondary {
      width: 100%;
      border-radius: 12px;
      padding: 12px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      font-size: 13px;
      text-align: left;
    }
    .field, .lesson, .answer, .notif {
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      padding: 12px;
      margin-bottom: 8px;
    }
    .lesson { text-align: left; width: 100%; color: var(--text); }
    .answer { width: 100%; color: var(--text); text-align: left; }
    .answer.selected { background: #1c2410; border-color: var(--lime); color: var(--lime); }
    .field label { display: block; color: var(--eyebrow); font-size: 9px; font-weight: 800; letter-spacing: .1em; margin-bottom: 6px; }
    .field input {
      width: 100%;
      color: var(--text);
      background: var(--bg);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 13px;
    }
    .row-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: transparent;
      color: var(--text);
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      padding: 0;
    }
    .row-item:last-child { border-bottom: 0; }
    .row-icon { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: var(--bg); }
    .chev { margin-left: auto; color: var(--eyebrow); }
    .toggle {
      width: 44px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: #30302c;
      padding: 2px;
      margin-left: auto;
    }
    .toggle span { display: block; width: 20px; height: 20px; border-radius: 50%; background: #8b8b83; transition: transform .16s; }
    .toggle.on { background: var(--lime); }
    .toggle.on span { transform: translateX(20px); background: var(--bg); }
    .settings-group { padding: 4px 14px 8px; margin-bottom: 14px; }
    .settings-group-title { margin: 18px 0 8px; color: var(--eyebrow); font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }

    .login-logo { text-align: center; margin-bottom: 34px; }
    .login-logo .wordmark { font-size: 44px; }
    .login-card {
      border-color: rgba(198,255,58,.16);
      border-radius: 22px;
      box-shadow: 0 0 22px rgba(198,255,58,.08), 0 10px 28px rgba(0,0,0,.55);
      padding: 22px;
      margin-bottom: 14px;
    }
    .login-input {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .login-select {
      width: 100%;
      appearance: none;
      background: var(--bg);
      color: var(--text);
      border: 1px solid rgba(198,255,58,.22);
      border-radius: 12px;
      padding: 13px 38px 13px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      outline: none;
    }
    .select-wrap {
      position: relative;
    }
    .select-wrap:after {
      content: "⌄";
      position: absolute;
      right: 14px;
      top: 11px;
      color: var(--lime);
      font-size: 16px;
      pointer-events: none;
    }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 0 0 18px; color: var(--soft); font-size: 12px; cursor: pointer; }
    .check { width: 18px; height: 18px; border-radius: 5px; border: 1px solid rgba(255,255,255,.2); display: grid; place-items: center; color: var(--bg); font-size: 11px; font-weight: 800; }

        if (doc.exists) {
          const data = doc.data();
          USER_FIELDS.forEach(k => { if (data[k] !== undefined) state[k] = data[k]; });
        }
      } catch (e) { console.error("loadUserData:", e); }
    }

    }

    function restoreState() {
      try {
        const raw = localStorage.getItem("banterone_session");
        if (!raw) return;
        const d = JSON.parse(raw);
        if (d.email) state.selectedUserEmail = d.email;
        // Always open to home — never restore a mid-session tab
        if (d.email && d.tab && d.tab !== "login") state.tab = "home";

            const canvas = document.createElement("canvas");
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext("2d");
            const min = Math.min(img.width, img.height);
            const sx = (img.width - min) / 2, sy = (img.height - min) / 2;
            ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
            resolve(canvas.toDataURL("image/jpeg", 0.75));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function storeScreen() {
      const user = activeUser();
      const store = activeStore();
      const sub = submissionForStore(store.id);
      const today = new Date();
      const dayOfMonth = today.getDate();
      const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
      const monthsElapsed = today.getMonth() + (dayOfMonth / daysInMonth);

      // LY logic: use higher of plan vs last year
      const effectiveDailyPlan = Math.max(store.dailyPlan, store.lyDailyPlan || 0);
      const usingLY = store.lyDailyPlan && store.lyDailyPlan > store.dailyPlan;
      // EP goal must exceed last year's daily average
      const lyEPGoal = store.lyEP || 0;
      const epGoal = Math.max((store.dailyPlan > 4000 ? 5 : 4), lyEPGoal + 1);

      const planPct = Math.round((sub.bold / effectiveDailyPlan) * 100);
      const stretchGoal = Math.round(effectiveDailyPlan * 1.30);
      const weeklyPlan = effectiveDailyPlan * 7;
      const mtdSales = sub.bold * dayOfMonth;
      const mtdPlan = effectiveDailyPlan * daysInMonth;
      const mtdPct = Math.round((mtdSales / mtdPlan) * 100);
      const ytdSales = sub.bold * dayOfMonth * (today.getMonth() + 1);
      const ytdPlan = effectiveDailyPlan * 365;
      const ytdPct = Math.round((ytdSales / ytdPlan) * 100);
      const convRate = sub.trans ? Math.round((sub.trans / (sub.trans + 8)) * 100) : 0;
      const esaPct = sub.trans ? Math.round((sub.esa / sub.trans) * 100) : 0;
      const epPct = Math.round((sub.ep / epGoal) * 100);
      const poPct = sub.trans ? Math.round((sub.po / sub.trans) * 100) : 0;
      const stjMtd = sub.stj * dayOfMonth;
      const stjGoal = 10;
      const stjMtdGoal = stjGoal * daysInMonth;

      const team = users.filter(u => u.storeId === store.id);
      const totalTeamHours = team.reduce((s, u) => {
        const m = individualMetrics.find(im => im.email === u.email);
        return s + (m ? (m.hours || 6) : 6);
      }, 0);
      const teamMetrics = team.map(u => {
        const m = individualMetrics.find(im => im.email === u.email) || { sales: 0, piercingSales: 0, esaSales: 0, piercings: 0, esaCount: 0, hours: 6, stjude: 0 };
        const indivHours = m.hours || 6;
        const indivGoal = totalTeamHours > 0 ? Math.round(store.dailyPlan * (indivHours / totalTeamHours)) : 0;
        const indivGoalPct = indivGoal ? Math.round((m.sales / indivGoal) * 100) : 0;
        return { ...u, ...m, indivGoal, indivGoalPct };
      }).sort((a, b) => b.sales - a.sales);

      const storeBoard = buildStoreBoard("today");

      return `<div class="stat"><div class="stat-row"><span>${label}</span><span>${value}%</span></div><div class="track"><div class="fill ${blue ? "blue" : ""}" style="width:${pct(value)}"></div></div></div>`;

        <section class="screen top-space">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">

          <div class="card post"><div class="eyebrow">FY27 Commission Ladder</div><div class="serif store-title">Rates, stretch tiers, and attach goals</div><div class="caption">Keep warranty and piercing attach conversations tied to customer care.</div></div>

    function districtMap(storeBoard) {
      const pos = {
        "3922": { x: 215, y: 118, label: "Cherry Creek" },
        "3905": { x: 224, y: 150, label: "Park Meadows" },
        "2595": { x: 196, y: 86,  label: "Flatiron" },
        "242":  { x: 250, y: 112, label: "Aurora" },
        "1026": { x: 228, y: 208, label: "Citadel" },
        "1241": { x: 207, y: 194, label: "Chapel Hills" },
        "3709": { x: 40,  y: 142, label: "Mesa Mall" },
        "907":  { x: 126, y: 368, label: "Cottonwood" },
        "1332": { x: 160, y: 354, label: "Cor. North" },
        "3739": { x: 155, y: 382, label: "Cor. South" },
        "123":  { x: 202, y: 310, label: "Santa Fe" },
      };
      const myStoreId = activeUser().storeId;
      const pins = storeBoard.map((row, i) => {
        const p = pos[row.id];
        if (!p) return "";
        const pct = row.pct || 0;
        const clr = pct >= 100 ? "#c6ff3a" : pct >= 80 ? "#ffd700" : "#ff5050";
        const isMe = myStoreId === row.id;
        const r = isMe ? 9 : 7;
        const delay = ((i * 0.4) % 2).toFixed(1);
        return `
          <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${clr}" stroke="none">
            <animate attributeName="r" values="${r};${r + 13};${r + 13}" dur="2s" begin="${delay}s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.6;0;0" dur="2s" begin="${delay}s" repeatCount="indefinite"/>
          </circle>
          ${isMe ? `<circle cx="${p.x}" cy="${p.y}" r="14" fill="none" stroke="${clr}" stroke-width="1.5" opacity=".45"/>` : ""}
          <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${clr}" opacity=".92" data-action="map-pin" data-store="${row.id}" style="cursor:pointer"/>
          <text x="${p.x}" y="${p.y + 21}" text-anchor="middle" fill="rgba(255,255,255,.8)" font-size="8.5" pointer-events="none">${p.label}</text>
          <text x="${p.x}" y="${p.y + 31}" text-anchor="middle" fill="${clr}" font-size="8" font-weight="bold" pointer-events="none">${pct}%</text>`;
      }).join("");
      return `
        <div style="background:var(--card);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.07);padding:10px 6px 8px">
          <svg viewBox="0 0 340 492" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
            <rect x="26" y="16" width="294" height="250" rx="3" fill="rgba(198,255,58,.04)" stroke="rgba(198,255,58,.22)" stroke-width="1.2"/>
            <text x="174" y="34" text-anchor="middle" fill="rgba(255,255,255,.18)" font-size="11" font-family="Georgia,serif" letter-spacing=".12em">COLORADO</text>
            <rect x="26" y="266" width="250" height="212" rx="3" fill="rgba(255,180,50,.03)" stroke="rgba(255,160,40,.18)" stroke-width="1.2"/>
            <text x="151" y="462" text-anchor="middle" fill="rgba(255,255,255,.18)" font-size="11" font-family="Georgia,serif" letter-spacing=".12em">NEW MEXICO</text>
            <text x="220" y="72" text-anchor="middle" fill="rgba(255,255,255,.13)" font-size="7" letter-spacing=".1em">DENVER METRO</text>
            <text x="218" y="180" text-anchor="middle" fill="rgba(255,255,255,.12)" font-size="6.5" letter-spacing=".08em">COLORADO SPRINGS</text>
            <text x="148" y="338" text-anchor="middle" fill="rgba(255,255,255,.12)" font-size="6.5" letter-spacing=".08em">ALBUQUERQUE</text>
            ${pins}
          </svg>
          <div style="display:flex;gap:16px;justify-content:center;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)">
            <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--soft)"><span style="width:8px;height:8px;border-radius:50%;background:#c6ff3a;display:inline-block"></span>≥100%</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--soft)"><span style="width:8px;height:8px;border-radius:50%;background:#ffd700;display:inline-block"></span>80–99%</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--soft)"><span style="width:8px;height:8px;border-radius:50%;background:#ff5050;display:inline-block"></span>&lt;80%</div>
          </div>
        </div>`;
    }

    function arenaScreen() {
      const storeBoard = buildStoreBoard(state.arenaScope);
      const individualBoard = buildIndividualBoard(state.individualMetric);
      const leaderboardHTML = `
          <div class="neon-spacer left"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px">
            ${arenaTab("today", "Today")}
            ${arenaTab("monthly", "MTD")}
            ${arenaTab("ytd", "YTD")}
          </div>
          <div class="section-row"><div class="section-title">Store Leaderboard</div><div class="post-time">${scopeLabel(state.arenaScope)}</div></div>
          ${storeBoard.map(storeArenaRow).join("")}
          <div class="neon-spacer"></div>
          <div class="section-row" style="margin-top:18px"><div class="section-title">Individual Leaderboard</div></div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px">
            ${metricTab("sales", "💰 Sales")}
            ${metricTab("avt", "🎯 Avg Ticket")}
            ${metricTab("piercings", "🪡 Piercings")}
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:14px">
            ${metricTab("stjude", "❤️ St. Jude")}
            ${metricTab("esa", "🛡 ESA Rate")}
            ${metricTab("climb", "📈 Daily Climb")}
          </div>
          ${individualBoard.map(individualArenaRow).join("")}`;
      return `
        <section class="screen top-space">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
            <h1 class="serif" style="font-size:28px;margin:0">District Arena</h1>
            ${topCluster()}
          </div>
          <div class="caption" style="margin-bottom:10px">11-store CO + NM district · Tap any name to view profile.</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
            <button class="nav-btn ${!state.mapView ? "active" : ""}" data-action="toggle-map-view" data-view="list" style="height:34px;border:1px solid rgba(255,255,255,.08)">📋 Leaderboard</button>
            <button class="nav-btn ${state.mapView ? "active" : ""}" data-action="toggle-map-view" data-view="map" style="height:34px;border:1px solid rgba(255,255,255,.08)">🗺️ District Map</button>
          </div>
          ${state.mapView ? districtMap(storeBoard) : leaderboardHTML}
        </section>`;
    }

    function money(value) {
      return `$${Math.round(Number(value) || 0).toLocaleString()}`;
    }

    function cleanDocName(name) {
      return name.replace(/\.pdf$/i, "").replace(/\s+\(\d+\)$/g, "");
    }

    function arenaTab(scope, label) {
      const active = state.arenaScope === scope;
      return `<button class="nav-btn ${active ? "active" : ""}" data-action="arena-scope" data-scope="${scope}" style="height:34px;border:1px solid rgba(255,255,255,.08)">${label}</button>`;
    }

    function metricTab(metric, label) {
      const active = state.individualMetric === metric;
      return `<button class="nav-btn ${active ? "active" : ""}" data-action="individual-metric" data-metric="${metric}" style="height:34px;border:1px solid rgba(255,255,255,.08)">${label}</button>`;
    }

    function scopeLabel(scope) {
      if (scope === "today") return "Today $";
      if (scope === "monthly") return "MTD $";
      return "YTD $";
    }

    function scopeMultiplier(scope) {
      if (scope === "today") return 1;
      if (scope === "monthly") return 2;
      return 13;
    }

    function buildStoreBoard(scope) {
      const multiplier = scopeMultiplier(scope);
      return stores.map(store => {
        const sub = dailySubmissions.find(row => row.storeId === store.id) || {};
        const bold = (sub.bold || 0) * multiplier;
        const plan = store.dailyPlan * multiplier;
        return {
          ...store,
          bold,
          stj: (sub.stj || 0) * multiplier,
          ep: (sub.ep || 0) * multiplier,
          esa: (sub.esa || 0) * multiplier,
          pct: plan ? Math.round((bold / plan) * 100) : 0
        };
      }).sort((a, b) => b.bold - a.bold);
    }

    function storeArenaRow(row, index) {
      const user = activeUser();
      const isMine = user.storeId === "DISTRICT" ? false : row.id === user.storeId;
      return `
        <div class="card leader-row">
          <div class="rank">${index + 1}</div>
          <div class="store-chip">#${row.id}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${row.name}${isMine ? ' <span style="color:var(--lime)">· YOU</span>' : ""}</div>
            <div class="post-time">${row.mall}</div>
            <div class="post-time">${row.manager} · EP ${row.ep} · ESA ${row.esa} · St. Jude ${money(row.stj)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:13px;font-weight:800">${money(row.bold)}</div>
            <div class="post-time" style="${row.pct >= 100 ? "color:var(--lime);font-weight:800" : ""}">${row.pct}%</div>
          </div>
        </div>`;
    }

    function buildIndividualBoard(metric) {
      const viewer = activeUser();
      const isDM = viewer.storeId === "DISTRICT";
      const isManager = isDM || viewer.role === "Store Manager" || viewer.role === "Assistant Manager";
      const visibleEmails = isDM
        ? individualMetrics.map(r => r.email)
        : isManager
          ? individualMetrics.filter(r => { const u = users.find(p => p.email === r.email); return u && u.storeId === viewer.storeId; }).map(r => r.email)
          : [viewer.email];
      return individualMetrics.filter(r => visibleEmails.includes(r.email)).map(row => {
        const u = users.find(person => person.email === row.email) || {};
        const store = stores.find(s => s.id === u.storeId) || {};
        const totalHours = individualMetrics.filter(m => {
          const um = users.find(p => p.email === m.email);
          return um && um.storeId === u.storeId;
        }).reduce((s, m) => s + (m.hours || 6), 0);
        const myHours = row.hours || 6;
        const storeSub = store.id ? (dailySubmissions.find(d => d.storeId === store.id) || {}) : {};
        const indivGoal = store.dailyPlan ? Math.round(store.dailyPlan * (myHours / Math.max(1, totalHours))) : 0;
        const climbPct = indivGoal ? Math.round((row.sales / indivGoal) * 100) : 0;
        const esaRate = row.esaCount && row.piercings + row.esaCount > 0
          ? Math.round((row.esaCount / Math.max(1, Math.round(row.sales / 160))) * 100)
          : 0;

        let value = row.sales;
        if (metric === "avt") value = row.sales ? Math.round(row.sales / Math.max(1, Math.round(row.sales / 160))) : 0;
        if (metric === "piercings") value = row.piercings;
        if (metric === "stjude") value = row.stjude || 0;
        if (metric === "esa") value = esaRate;
        if (metric === "climb") value = climbPct;
        return { ...row, ...u, value, indivGoal, climbPct, esaRate };
      }).sort((a, b) => b.value - a.value);
    }

    function individualArenaRow(row, index) {
      const m = state.individualMetric;
      const isMoney = m === "sales" || m === "avt" || m === "stjude";
      const isPct = m === "esa" || m === "climb";
      const display = isMoney ? money(row.value) : isPct ? `${row.value}%` : `${row.value}`;
      const user = activeUser();
      const storeName = stores.find(s => s.id === row.storeId)?.name || `Store ${row.storeId}`;
      return `
        <div class="card leader-row" data-action="open-profile" data-email="${row.email}" style="cursor:pointer">
          <div class="rank">${index + 1}</div>
          <div class="avatar" style="width:32px;height:32px;font-size:10px">${(row.name || "?").split(" ").map(part => part[0]).join("").slice(0,2)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${row.name || row.email}${row.email === user.email ? ' <span style="color:var(--lime)">· YOU</span>' : ""}</div>
            <div class="post-time">${storeName}${row.indivGoal ? ` · Goal ${money(row.indivGoal)}` : ""}</div>
          </div>
          <div style="font-size:14px;font-weight:800;color:var(--lime);text-align:right">${display}</div>
        </div>`;
    }

    function insightsScreen() {
      const user = activeUser();
      const isDM = user.storeId === "DISTRICT";
      const isManager = isDM || user.role === "Store Manager" || user.role === "Assistant Manager";

      const board = buildStoreBoard("today");
      const focusStores = isDM ? stores : stores.filter(s => s.id === user.storeId);

      function insightCard(icon, title, body, urgency = "normal") {
        const clrMap = { high: "#e5484d", medium: "#f5a524", low: "#5b8def", normal: "var(--lime)" };
        const bgMap = { high: "rgba(229,72,77,.08)", medium: "rgba(245,165,36,.06)", low: "rgba(91,141,239,.06)", normal: "rgba(198,255,58,.06)" };
        return `<div class="card" style="padding:14px;border-left:3px solid ${clrMap[urgency]};background:${bgMap[urgency]}">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <span style="font-size:20px;flex-shrink:0">${icon}</span>
            <div>
              <div style="font-size:13px;font-weight:700;margin-bottom:4px">${title}</div>
              <div style="font-size:12px;color:var(--soft);line-height:1.5">${body}</div>
            </div>
          </div>
        </div>`;
      }

      const insights = [];

      focusStores.forEach(store => {
        const sub = dailySubmissions.find(d => d.storeId === store.id) || {};
        const effectivePlan = Math.max(store.dailyPlan, store.lyDailyPlan || 0);
        const pct = effectivePlan ? Math.round((sub.bold / effectivePlan) * 100) : 0;
        const esaPct = sub.trans ? Math.round((sub.esa / sub.trans) * 100) : 0;
        const poPct = sub.trans ? Math.round((sub.po / sub.trans) * 100) : 0;
        const avtGap = 155 - (sub.avt || 0);
        const epGoal = Math.max((store.dailyPlan > 4000 ? 5 : 4), (store.lyEP || 0) + 1);
        const prefix = isDM ? `<strong>${store.name}:</strong> ` : "";

        if (pct < 60) {
          insights.push({ urgency: "high", icon: "🚨", title: `${store.name} — Sales Alert`, body: `${prefix}At ${pct}% of goal (${money(sub.bold)} of ${money(effectivePlan)}). Need ${money(effectivePlan - sub.bold)} more to reach plan. Coach the team on upsell opportunities and warranty conversations.` });
        } else if (pct < 85) {
          insights.push({ urgency: "medium", icon: "⚠️", title: `${store.name} — Below Pace`, body: `${prefix}At ${pct}% — within striking distance of plan. ${money(effectivePlan - sub.bold)} gap. Focus on increasing avg ticket and add-on conversations.` });
        }

        if (esaPct < 40) {
          insights.push({ urgency: "high", icon: "🛡", title: `${store.name} — ESA Rate Critical`, body: `${prefix}ESA at ${esaPct}% vs 50% target. Only ${sub.esa} of ${sub.trans} transactions protected. Role-play the ESA conversation at next huddle — lead with the damage and breakage scenario. Remind team: 75% of the item back gets it replaced, no questions asked.` });
        } else if (esaPct < 50) {
          insights.push({ urgency: "medium", icon: "🛡", title: `${store.name} — ESA Below Target`, body: `${prefix}ESA at ${esaPct}% — just ${Math.ceil(sub.trans * 0.5) - sub.esa} more attach${Math.ceil(sub.trans * 0.5) - sub.esa !== 1 ? "es" : ""} needed to hit 50%. Remind team during the next floor check.` });
        }

        if (poPct < 15) {
          insights.push({ urgency: "medium", icon: "💳", title: `${store.name} — Payment Options Low`, body: `${prefix}Payment Options at ${poPct}% vs 18% target. Offer the Banter credit card to every customer paying $200+. Every application counts toward district ranking.` });
        }

        if (avtGap > 20) {
          insights.push({ urgency: "medium", icon: "🎯", title: `${store.name} — Avg Ticket Gap`, body: `${prefix}Avg ticket at ${money(sub.avt)} vs $155 target ($${avtGap} gap). Push warranty, payment options, and piercing bundles. Even one extra $50 add-on per transaction closes this gap.` });
        }

        if (sub.ep < epGoal) {
          insights.push({ urgency: "low", icon: "🪡", title: `${store.name} — Piercing Opportunity`, body: `${prefix}${sub.ep} piercings today vs goal of ${epGoal} (must beat LY ${store.lyEP}). Is the piercing station visible and staffed? A quick reminder at the door can add 1–2 walk-up piercings.` });
        }

        if ((sub.stj || 0) < 10) {
          insights.push({ urgency: "low", icon: "❤️", title: `${store.name} — St. Jude Reminder`, body: `${prefix}$${sub.stj || 0} collected today vs $10 goal. Coach team to mention St. Jude at every transaction — "Every dollar goes directly to kids' cancer research."` });
        }
      });

      // District-level insights for DM
      if (isDM && board.length) {
        const top = board[0];
        const bottom = board[board.length - 1];
        if (top.pct >= 100) insights.unshift({ urgency: "normal", icon: "🏆", title: `${top.name} is Leading the District`, body: `${top.name} at ${top.pct}% with ${money(top.bold)} — ahead of plan. Consider spotlighting them in a Home feed shoutout to fuel momentum across the district.` });
        if (bottom.pct < 70) insights.push({ urgency: "high", icon: "📉", title: `${bottom.name} Needs Attention`, body: `Last-place store at ${bottom.pct}% (${money(bottom.bold)}). Recommend a direct call with ${bottom.manager} to identify blockers — staffing, traffic, or execution gaps.` });

        const belowESA = board.filter(r => {
          const s = dailySubmissions.find(d => d.storeId === r.id) || {};
          return s.trans && Math.round((s.esa / s.trans) * 100) < 40;
        });
        if (belowESA.length >= 3) insights.push({ urgency: "high", icon: "🛡", title: "District-Wide ESA Concern", body: `${belowESA.length} stores have ESA below 40%. This is a systemic issue — consider a district-wide coaching call focused on the ESA pitch and objection handling.` });
      }

      if (!insights.length) {
        insights.push({ urgency: "normal", icon: "✅", title: "All Clear!", body: "All metrics are tracking at or above expectations. Keep up the momentum and look for stretch opportunities." });
      }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];
      const headers = lines[0].split(",").map(h => h.trim());
      return lines.slice(1).map(line => {
        const vals = line.split(",").map(v => v.trim());
        const obj = {};
        headers.forEach((h, i) => { obj[h] = isNaN(vals[i]) ? vals[i] : Number(vals[i]); });
        return obj;
      }).filter(o => Object.values(o).some(v => v !== "" && v !== undefined));
    }

    function calendarOverlay() {
      const m = state.calendarMonth;
      const y = state.calendarYear;
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const startDay = new Date(y, m, 1).getDay();
      const today = new Date();
      const isCurrentMonth = today.getMonth() === m && today.getFullYear() === y;
      const todayDate = today.getDate();
      const allEvents = [...calEvents, ...customCalEvents].filter(e => e.month === undefined || e.month === m);
      const selectedDay = state.calendarSelectedDay || (isCurrentMonth ? todayDate : 1);
      const dayEvents = allEvents.filter(e => e.day === selectedDay);

      let cells = "";
      for (let i = 0; i < startDay; i++) cells += `<div class="cal-cell empty"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const evts = allEvents.filter(e => e.day === d);
        const isTd = isCurrentMonth && d === todayDate;
        const isSel = d === selectedDay;
        cells += `<div class="cal-cell ${isTd ? "today" : ""}" data-action="cal-select-day" data-day="${d}" style="${isSel ? "outline:1px solid var(--lime);outline-offset:-1px;border-radius:4px;" : ""}cursor:pointer;">
          <div class="cal-day">${d}</div>
          <div class="cal-dots">${evts.slice(0, 4).map(e => `<div class="cal-dot" style="background:${calCategories[e.cat]?.color || "#888"}"></div>`).join("")}${evts.length > 4 ? `<div style="font-size:7px;color:var(--muted)">+${evts.length - 4}</div>` : ""}</div>
        </div>`;
      }

      const editForm = state.calendarEditEvent !== null ? `
        <div class="cal-form">
          <input data-field="cal-event-name" placeholder="Event name" value="">
          <select data-field="cal-event-cat">
            ${Object.entries(calCategories).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join("")}
          </select>
          <div class="cal-form-actions">
            <button style="background:var(--lime);color:var(--bg)" data-action="cal-save-event">Save</button>
            <button style="background:rgba(255,255,255,.08);color:var(--text)" data-action="cal-cancel-event">Cancel</button>
          </div>
        </div>` : "";

      return `
        <section class="full-overlay" style="padding-top:48px">
          <div class="overlay-head">
            <h2 class="serif" style="font-size:22px;margin:0">Calendar</h2>
            <button class="close" data-action="close-calendar">×</button>
          </div>
          <div class="cal-month-bar">
            <button data-action="cal-prev">‹</button>
            <div class="cal-month-title">${monthNames[m]} ${y}</div>
            <button data-action="cal-next">›</button>
          </div>
          <div class="cal-grid">
            ${["SUN","MON","TUE","WED","THU","FRI","SAT"].map(d => `<div class="cal-head">${d}</div>`).join("")}
            ${cells}
          </div>
          <div class="cal-day-detail">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div class="section-title" style="font-size:13px">${monthNames[m]} ${selectedDay}</div>
              <div style="font-size:11px;color:var(--muted)">${dayEvents.length} event${dayEvents.length !== 1 ? "s" : ""}</div>
            </div>
            ${dayEvents.length ? dayEvents.map(e => `
              <div class="cal-event-row">
                <div class="cal-event-dot" style="background:${calCategories[e.cat]?.color || "#888"}"></div>
                <div style="flex:1"><div class="cal-event-text">${esc(e.text)}</div><div class="cal-event-cat">${calCategories[e.cat]?.label || e.cat}</div></div>
              </div>`).join("") : `<div style="text-align:center;color:var(--muted);font-size:12px;padding:18px 0">No events</div>`}
            <button class="cal-add-btn" data-action="cal-add-event">+ Add event</button>
            ${editForm}
          </div>
          <div class="cal-legend">
            ${Object.entries(calCategories).map(([k, v]) => `<div class="cal-legend-item"><div class="cal-legend-dot" style="background:${v.color}"></div>${v.label}</div>`).join("")}
          </div>
        </section>`;
    }

    function trainOverlay() {
      const tr = state.train;
      if (tr.step === "pick") {
        return `<section class="full-overlay"><div class="overlay-head"><h2 class="serif" style="font-size:24px;margin:0">What would you like to learn?</h2><button class="close" data-action="close-train">×</button></div>${lessons.map(l => `<button class="lesson" data-action="choose-lesson" data-id="${l.id}"><strong>${l.title}</strong><div class="post-time" style="margin-top:4px">${l.meta}${l.pdf ? ' · <span style="color:var(--lime)">📄 PDF</span>' : ''}</div></button>`).join("")}</section>`;
      }
      const lesson = lessons.find(l => l.id === tr.lessonId) || lessons[0];
      if (tr.step === "article") {
        return `<section class="full-overlay"><div class="overlay-head"><div><div class="eyebrow">Playbook · Training</div><h2 class="serif" style="font-size:24px;margin:2px 0 0">${lesson.title}</h2></div><button class="close" data-action="close-train">×</button></div><p style="font-size:13px;line-height:1.55;color:var(--body)">${lesson.body}</p>${lesson.pdf ? `<a href="docs/${encodeURIComponent(lesson.pdf)}" target="_blank" rel="noreferrer" style="display:block;padding:10px 14px;background:rgba(198,255,58,.08);border:1px solid rgba(198,255,58,.2);border-radius:10px;color:var(--lime);font-size:12px;font-weight:700;text-decoration:none;margin-bottom:12px">📄 Open ${lesson.pdf.replace('.pdf','')}</a>` : ''}<button class="primary" data-action="train-next">Finished reading</button></section>`;
      }
      if (tr.step === "quiz") {
        const allAnswered = tr.answers.filter(a => a !== undefined).length === lesson.quiz.length;
        return `<div class="overlay"><section class="modal-card"><div class="overlay-head"><div><div class="eyebrow">Quiz · 3 questions</div><h2 class="serif" style="font-size:24px;margin:2px 0 0">${lesson.title}</h2></div><button class="close" data-action="close-train">×</button></div>${lesson.quiz.map((q, qi) => `<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">${qi + 1}. ${q.q}</div>${q.options.map((opt, oi) => `<button class="answer ${tr.answers[qi] === oi ? "selected" : ""}" data-action="answer" data-q="${qi}" data-a="${oi}">${opt}</button>`).join("")}</div>`).join("")}<button class="primary" data-action="submit-quiz" ${allAnswered ? "" : "disabled"}>Submit answers</button></section></div>`;
      }
      return `<section class="full-overlay" style="display:grid;place-items:center;text-align:center"><div><div style="font-size:42px">${tr.perfect ? "🌟" : tr.passed ? "🎉" : "📖"}</div><h2 class="serif" style="font-size:28px;margin:8px 0">${tr.perfect ? "Perfect score!" : tr.passed ? "Training complete!" : "Not quite — review and retry"}</h2><p style="font-size:13px;color:var(--body);line-height:1.45">${tr.passed ? `Scored ${tr.correct}/3 · +${tr.xp} XP${tr.perfect ? " (double!)" : ""}, Bond +${tr.perfect ? 12 : 8}%` : `Scored ${tr.correct}/3 — need at least 2/3 to pass.`}</p><button class="primary" data-action="${tr.passed ? "close-train" : "retry-train"}">${tr.passed ? "Done" : "Retry quiz"}</button></div></section>`;
    }

    const screenWrap = document.getElementById("screen-wrap");
    const navWrap = document.getElementById("nav-wrap");
    const overlayWrap = document.getElementById("overlay-wrap");

    function render() {
      const screens = { login: loginScreen, home: homeScreen, store: storeScreen, buddy: buddyScreen, playbook: playbookScreen, arena: arenaScreen, insights: insightsScreen };
      const prevTab = screenWrap.dataset.tab;
      const savedScroll = screenWrap.scrollTop;
      screenWrap.innerHTML = screens[state.tab]();
      screenWrap.dataset.tab = state.tab;
      if (state.tab === prevTab && savedScroll) {
        screenWrap.scrollTop = savedScroll;
        requestAnimationFrame(() => { screenWrap.scrollTop = savedScroll; });
      } else if (state.tab !== prevTab) {
        screenWrap.scrollTop = 0;
      }
      navWrap.innerHTML = nav();
      overlayWrap.innerHTML = overlays();
      const compose = document.getElementById("composeText");
      if (compose) {
        compose.focus();
        compose.selectionStart = compose.selectionEnd = compose.value.length;
        compose.addEventListener("input", event => {
          state.composeText = event.target.value;
          const send = app.querySelector('[data-action="send-post"]');
          if (send) send.disabled = !state.composeText.trim();
        });
      }
      const dmInput = document.getElementById("dm-input");
      if (dmInput) {
        dmInput.addEventListener("input", e => { state.composeMessage = e.target.value; });
        dmInput.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            const text = e.target.value.trim();
            if (text && state.messageThread) {
              if (!state.directMessages[state.messageThread]) state.directMessages[state.messageThread] = [];
              const now = new Date();
              state.directMessages[state.messageThread].push({ from: activeUser().email, text, time: now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) });
              state.composeMessage = "";
              saveUserData(); render();
            }
          }
        });
        dmInput.focus();
      }
      if (state.replyingToId) {
        const ri = document.getElementById(`reply-input-${state.replyingToId}`);
        if (ri) { ri.focus(); ri.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); app.querySelector(`[data-action="send-reply"][data-id="${state.replyingToId}"]`)?.click(); } }); }
      }
      const photoInput = document.getElementById("photo-upload");
      if (photoInput) {
        photoInput.addEventListener("change", async e => {
          const file = e.target.files[0];
          if (!file) return;
          showToast("Saving photo…");
          state.userPhoto = await compressImage(file, 120);
          saveUserData();
          render();
          showToast("Photo saved");
        });
      }
    }

    app.addEventListener("click", event => {
      const el = event.target.closest("[data-action]");
      const stop = event.target.closest("[data-stop]");
      if (stop && !el) return;
      if (stop && el && !stop.contains(el)) return;
      if (!el) return;
      const action = el.dataset.action;
      if (action === "login") {
        const user = activeUser();
        const entered = (app.querySelector('[data-field="password"]')?.value || "").trim().toUpperCase();
        const expected = passwordInitials(user.name);
        if (entered !== expected) {
          setState({ loginError: `Use ${user.name}'s first and last initials.` });
          return;
        }
        const store = activeStore();
        const sub = submissionForStore(store.id);
        const feedCharges = Math.min(3, Math.floor(sub.bold / 500));
        const trainCharges = Math.min(2, sub.ep);
        const cheerCharges = Math.min(3, sub.esa);
        state.tab = "buddy"; state.loginError = "";
        state.charges = { feed: feedCharges, train: trainCharges, cheer: cheerCharges };
        state.chargesEarned = true;
        render();
        loadUserData(user.email).then(() => render());
        subscribeToSharedData();
        seedFeedIfEmpty();
        saveState();
      }
      if (action === "toggle-pw") setState({ pwVisible: !state.pwVisible });
      if (action === "stay") setState({ staySignedIn: !state.staySignedIn });
      if (action === "toggle-demo") setState({ demoOpen: !state.demoOpen });
      if (action === "tab") setState({ tab: el.dataset.tab });
      if (action === "arena-scope") setState({ arenaScope: el.dataset.scope });
      if (action === "toggle-map-view") setState({ mapView: el.dataset.view === "map" });
      if (action === "map-pin") setState({ mapView: false });
      if (action === "individual-metric") setState({ individualMetric: el.dataset.metric });
      if (action === "store-scope") setState({ storeScope: el.dataset.scope });
      if (action === "open-profile") setState({ profileOpen: true, profileEmail: el.dataset.email });
      if (action === "close-profile" || action === "close-profile-bg") setState({ profileOpen: false, profileEmail: null });
      if (action === "open-messages") setState({ messagesOpen: true, messageThread: null });
      if (action === "close-messages") setState({ messagesOpen: false, messageThread: null, composeMessage: "" });
      if (action === "messages-back") setState({ messageThread: null, composeMessage: "" });
      if (action === "open-thread") setState({ messageThread: el.dataset.email });
      if (action === "start-dm") {
        const targetEmail = el.dataset.email;
        if (!state.directMessages[targetEmail]) state.directMessages[targetEmail] = [];
        setState({ profileOpen: false, profileEmail: null, messagesOpen: true, messageThread: targetEmail });
      }
      if (action === "send-dm") {
        const input = overlayWrap.querySelector("#dm-input");
        const text = (input ? input.value : state.composeMessage).trim();
        if (text && state.messageThread) {
          const thread = state.messageThread;
          if (!state.directMessages[thread]) state.directMessages[thread] = [];
          const now = new Date();
          const timeStr = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
          state.directMessages[thread].push({ from: activeUser().email, text, time: timeStr });
          state.composeMessage = "";
          saveUserData(); render();
        }
      }
      if (action === "open-notifications") setState({ notifOpen: true, unread: 0 });
      if (action === "close-notifications") setState({ notifOpen: false });
      if (action === "open-info") setState({ infoOpen: true });
      if (action === "close-info" || action === "close-info-bg") setState({ infoOpen: false });
      if (action === "open-evolution") setState({ evolutionOpen: true });
      if (action === "close-evolution" || action === "close-evolution-bg") setState({ evolutionOpen: false });
      if (action === "open-vault") setState({ vaultOpen: true });
      if (action === "close-vault") setState({ vaultOpen: false });
      if (action === "toggle-vault-item") {
        const item = state.vaultItems.find(i => i.id === el.dataset.id);
        if (item && item.unlocked) item.equipped = !item.equipped;
        render();
      }
      if (action === "open-settings") setState({ settingsOpen: true, settingsView: "menu" });
      if (action === "close-settings") setState({ settingsOpen: false });
      if (action === "logout") {
        unsubscribeAll();
        localStorage.removeItem("banterone_session");
        Object.assign(state, { tab: "login", settingsOpen: false, feed: [], disciplinaryReports: [], charges: { feed: 0, train: 0, cheer: 0 }, chargesEarned: false, myReactions: {}, buddy: { level: 1, xp: 0, xpNext: 100, care: 0, spark: 0, bond: 0 } });
        render();
      }
      if (action === "settings-back") setState({ settingsView: "menu" });
      if (action === "settings-item") setState({ settingsView: el.dataset.key });
      if (action === "save-settings") {
        const inputs = {};
        overlayWrap.querySelectorAll("[data-field]").forEach(inp => { inputs[inp.dataset.field] = inp.value.trim(); });
        if (state.settingsView === "profile") {
          const email = activeUser().email;
          state.userOverrides[email] = { ...state.userOverrides[email], name: inputs.name };
        } else if (state.settingsView === "admin-general") {
          state.districtName = inputs.districtName || state.districtName;
        }
        saveState();
        render();
        showToast("Changes saved");
      }
      if (action === "enable-push") {
        if (!("Notification" in window)) { showToast("Notifications not supported in this browser"); return; }
        Notification.requestPermission().then(perm => {
          if (perm === "granted") {
            showToast("Notifications enabled! Your Buddy will keep you posted.");
            scheduleBuddyNotifications();
            render();
          } else {
            showToast("Notifications blocked — enable in browser settings");
          }
        });
      }
      if (action === "toggle-field") {
        state.toggles[el.dataset.key] = !state.toggles[el.dataset.key];
        saveState(); render();
      }
      if (action === "react") {
        const postId = el.dataset.id;
        const key = el.dataset.key;
        const rKey = `${postId}_${key}`;
        const post = state.feed.find(p => p.id === postId);
        if (post) {
          const me = activeUser();
          if (!state.reactionUsers[rKey]) state.reactionUsers[rKey] = [];
          if (state.myReactions[rKey]) {
            post.reactions[key] = (post.reactions[key] || 1) - 1;
            delete state.myReactions[rKey];
            state.reactionUsers[rKey] = state.reactionUsers[rKey].filter(n => n !== me.name);
            db.collection("feed").doc(postId).update({ [`reactions.${key}`]: firebase.firestore.FieldValue.increment(-1) }).catch(console.error);
          } else {
            post.reactions[key] = (post.reactions[key] || 0) + 1;
            state.myReactions[rKey] = true;
            if (!state.reactionUsers[rKey].includes(me.name)) state.reactionUsers[rKey].push(me.name);
            db.collection("feed").doc(postId).update({ [`reactions.${key}`]: firebase.firestore.FieldValue.increment(1) }).catch(console.error);
            if (post.authorEmail !== me.email) {
              const emojiMap = { like: "👍", heart: "❤️", laugh: "😂", fire: "🔥", party: "🎉" };
              showInAppBanner(emojiMap[key] || "👍", `${me.name} reacted to ${post.name.split(" ")[0]}'s post`, post.text.slice(0, 60) + (post.text.length > 60 ? "…" : ""));
            }
          }
          saveUserData(); render();
        }
      }
      if (action === "show-reactions") {
        setState({ reactionsSheetPostId: el.dataset.id });
      }
      if (action === "close-reactions-sheet" || action === "close-reactions-sheet-bg") {
        setState({ reactionsSheetPostId: null });
      }
      if (action === "toggle-reply") {
        const id = el.dataset.id;
        setState({ replyingToId: state.replyingToId === id ? null : id });
      }
      if (action === "send-reply") {
        const id = el.dataset.id;
        const input = document.getElementById(`reply-input-${id}`);
        const text = input ? input.value.trim() : "";
        if (!text) return;
        const me = activeUser();
        const post = state.feed.find(p => p.id === id);
        if (!state.replies[id]) state.replies[id] = [];
        state.replies[id].push({ name: me.name, authorEmail: me.email, text, time: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) });
        if (post && post.authorEmail !== me.email) {
          showInAppBanner("💬", `${me.name} replied to ${post.name.split(" ")[0]}'s post`, text.slice(0, 60) + (text.length > 60 ? "…" : ""));
        }
        setState({ replyingToId: null });
      }
      if (action === "dismiss-banner" || action === "banner-tap") {
        if (bannerTimer) clearTimeout(bannerTimer);
        state.inAppBanner = null; render();
      }
      if (action === "go-store") setState({ tab: "store" });
      if (action === "go-arena") setState({ tab: "arena", mapView: false });
      if (action === "go-arena-map") setState({ tab: "arena", mapView: true });
      if (action === "open-post-menu") setState({ postMenuId: el.dataset.id });
      if (action === "close-post-menu" || action === "close-post-menu-bg") setState({ postMenuId: null });
      if (action === "delete-post") {
        db.collection("feed").doc(el.dataset.id).delete().catch(console.error);
        setState({ postMenuId: null }); showToast("Post deleted");
      }
      if (action === "edit-post") {
        const post = state.feed.find(p => p.id === el.dataset.id);
        if (post) setState({ postMenuId: null, editingPostId: post.id, composeText: post.text, composeOpen: true });
      }
      if (action === "report-post") {
        setState({ postMenuId: null });
        showToast("Post reported");
      }
      if (action === "open-goal-upload") setState({ goalUploadOpen: true });
      if (action === "close-goal-upload" || action === "close-goal-upload-bg") setState({ goalUploadOpen: false });
      if (action === "clear-imported-data") {
        setState({ importedSubmissions: null, importedIndividualMetrics: null, lastImportStatus: "" });
        showToast("Imported data cleared");
      }
      if (action === "store-metrics-file" || action === "individual-metrics-file") {
        const input = el;
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const isStore = action === "store-metrics-file";
        const alreadyHasData = isStore ? !!state.importedSubmissions : !!state.importedIndividualMetrics;
        const doImport = () => {
          const reader = new FileReader();
          reader.onload = e => {
            const rows = parseCSV(e.target.result);
            if (!rows.length) { showToast("Could not parse CSV — check format"); return; }
            if (isStore) {
              setState({ importedSubmissions: rows, lastImportStatus: `✓ Store metrics updated: ${rows.length} store(s) imported from ${file.name}` });
              showToast(`Store metrics updated for ${rows.length} store(s)`);
            } else {
              setState({ importedIndividualMetrics: rows, lastImportStatus: `✓ Employee metrics updated: ${rows.length} employee(s) imported from ${file.name}` });
              showToast(`Employee metrics updated for ${rows.length} employee(s)`);
            }
          };
          reader.readAsText(file);
        };
        if (alreadyHasData) {
          const label = isStore ? "store metrics" : "employee metrics";
          setState({ pendingImportConfirm: { action, file, doImport }, confirmPrompt: `You already have ${label} imported. Replace with "${file.name}"?` });
        } else {
          doImport();
        }
        input.value = "";
      }
      if (action === "confirm-overwrite-import") {
        if (state.pendingImportConfirm) {
          state.pendingImportConfirm.doImport();
          setState({ pendingImportConfirm: null, confirmPrompt: "" });
        }
      }
      if (action === "cancel-overwrite-import") {
        setState({ pendingImportConfirm: null, confirmPrompt: "" });
      }
      if (action === "open-reports") setState({ reportsOpen: true });
      if (action === "close-reports") setState({ reportsOpen: false, newReportOpen: false });
      if (action === "open-new-report") setState({ newReportOpen: true });
      if (action === "cancel-new-report") setState({ newReportOpen: false });
      if (action === "submit-report") {
        const name = overlayWrap.querySelector("[data-field='rep-name']")?.value.trim();
        const type = overlayWrap.querySelector("[data-field='rep-type']")?.value;
        const notes = overlayWrap.querySelector("[data-field='rep-notes']")?.value.trim();
        if (name && notes) {
          const user = activeUser();
          db.collection("reports").add({ employeeEmail: "", employeeName: name, storeId: user.storeId, type, date: new Date().toISOString().slice(0,10), createdAt: firebase.firestore.FieldValue.serverTimestamp(), notes, issuedBy: user.name }).catch(console.error);
          setState({ newReportOpen: false }); showToast("Report saved");
        } else { showToast("Please fill in all fields"); }
      }
      if (action === "open-compose") setState({ composeOpen: true, editingPostId: null });
      if (action === "close-compose") setState({ composeOpen: false, composeText: "", editingPostId: null });
      if (action === "send-post" && state.composeText.trim()) {
        if (state.editingPostId !== null) {
          db.collection("feed").doc(state.editingPostId).update({ text: state.composeText.trim() }).catch(console.error);
          setState({ editingPostId: null, composeOpen: false, composeText: "" }); showToast("Post updated");
        } else {
          setState({ composeOpen: false, flairOpen: true });
        }
      }
      if (action === "select-flair") setState({ pendingFlair: el.dataset.flair });
      if (action === "publish-post" || action === "skip-flair") {
        const flair = action === "skip-flair" ? "update" : state.pendingFlair;
        const user = activeUser();
        db.collection("feed").add({ name: user.name, initials: initials(user.name), authorEmail: user.email, timestamp: firebase.firestore.FieldValue.serverTimestamp(), flair, pinned: false, text: state.composeText.trim(), reactions: { like: 0, heart: 0, laugh: 0, fire: 0, party: 0 } }).catch(console.error);
        setState({ flairOpen: false, composeText: "", pendingFlair: "shoutout" });
      }
      if (action === "feed-buddy" && state.charges.feed > 0) {
        state.charges.feed -= 1; state.buddy.xp += 10; state.buddy.care = Math.min(100, state.buddy.care + 5);
        saveState(); showToast("Fed Buddy · +10 XP");
      }
      if (action === "cheer-buddy" && state.charges.cheer > 0) {
        state.charges.cheer -= 1; state.buddy.xp += 15; state.buddy.spark = Math.min(100, state.buddy.spark + 6); state.buddy.bond = Math.min(100, state.buddy.bond + 3);
        saveState(); showToast("Cheered Buddy · +15 XP");
      }
      if (action === "start-train") setState({ train: { step: "pick", lessonId: null, answers: [] } });
      if (action === "open-lesson") setState({ tab: "playbook", train: { step: "article", lessonId: el.dataset.id, answers: [] } });
      if (action === "choose-lesson") setState({ train: { step: "article", lessonId: el.dataset.id, answers: [] } });
      if (action === "train-next") setState({ train: { ...state.train, step: "quiz", answers: [] } });
      if (action === "answer") {
        state.train.answers[Number(el.dataset.q)] = Number(el.dataset.a);
        render();
      }
      if (action === "submit-quiz") {
        const lesson = lessons.find(l => l.id === state.train.lessonId);
        if (!lesson || state.train.answers.filter(a => a !== undefined).length !== lesson.quiz.length) return;
        const correct = lesson.quiz.reduce((sum, q, i) => sum + (state.train.answers[i] === q.correct ? 1 : 0), 0);
        const passed = correct >= 2;
        const perfect = correct === 3;
        if (passed) {
          state.charges.train -= 1;
          state.buddy.xp += perfect ? 80 : 40;
          state.buddy.bond = Math.min(100, state.buddy.bond + (perfect ? 12 : 8));
        }
        setState({ train: { ...state.train, step: "result", correct, passed, perfect, xp: perfect ? 80 : 40 } });
      }
      if (action === "retry-train") setState({ train: { ...state.train, step: "quiz", answers: [] } });
      if (action === "close-train") setState({ train: null });
      if (action === "open-calendar") setState({ calendarOpen: true, calendarSelectedDay: null });
      if (action === "close-calendar") setState({ calendarOpen: false, calendarEditEvent: null });
      if (action === "cal-prev") {
        let nm = state.calendarMonth - 1, ny = state.calendarYear;
        if (nm < 0) { nm = 11; ny--; }
        setState({ calendarMonth: nm, calendarYear: ny, calendarSelectedDay: null });
      }
      if (action === "cal-next") {
        let nm = state.calendarMonth + 1, ny = state.calendarYear;
        if (nm > 11) { nm = 0; ny++; }
        setState({ calendarMonth: nm, calendarYear: ny, calendarSelectedDay: null });
      }
      if (action === "cal-select-day") setState({ calendarSelectedDay: Number(el.dataset.day) });
      if (action === "cal-add-event") setState({ calendarEditEvent: true });
      if (action === "cal-cancel-event") setState({ calendarEditEvent: null });
      if (action === "cal-save-event") {
        const nameInput = app.querySelector('[data-field="cal-event-name"]');
        const catSelect = app.querySelector('[data-field="cal-event-cat"]');
        if (nameInput && nameInput.value.trim()) {
          customCalEvents.push({ day: state.calendarSelectedDay || 1, cat: catSelect.value, text: nameInput.value.trim(), month: state.calendarMonth });
          setState({ calendarEditEvent: null });
          showToast("Event added");
        }
      }
    });

    app.addEventListener("change", event => {
      const el = event.target.closest("[data-action]");
      if (!el) return;
      if (el.dataset.action === "select-user") {
        setState({ selectedUserEmail: el.value, loginError: "" });
      }
    });

    // Auto-resume session from localStorage
    if (state.selectedUserEmail && state.tab !== "login") {
      render();
      subscribeToSharedData();
      seedFeedIfEmpty();
      loadUserData(state.selectedUserEmail).then(() => render());
    } else {
      render();
    }
  </script>
</body>
</html>
